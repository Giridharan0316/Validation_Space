    sourceMapping:
      - aliases:
          U: U
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: SRC-ASTRUS
            nodeName: ACA_PAYMENT_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_RECOVERY_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_RESERVE_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_SOURCE_SYSTEM
          - locationName: SRC-ASTRUS
            nodeName: ACA_EXPERIENCE_TRANSACTION
        join:
          joinCondition: |-
            FROM (
              WITH VARS AS (
                  SELECT 
                      (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS') AS SOURCE_SYSTEM_ID_ESIS,
                      IFF({{ parameters.IREPROCESSSTARTTRANSACTIONDATE }} IS NULL, 
                          (SELECT IFNULL(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) 
                           FROM {{ ref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION') }} 
                           WHERE ACA_SOURCE_SYSTEM_ID = SOURCE_SYSTEM_ID_ESIS), 
                           '1900-01-01'::TIMESTAMP_NTZ) AS LAST_LOAD_DATE,
                      IFNULL({{ parameters.IREPROCESSSTARTTRANSACTIONDATE }}, '1900-01-01'::DATE) AS REPROCESS_START_TRANSACTION_DATE
              )
              SELECT SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE, MAX(RESERVE_TYPE) AS RESERVE_TYPE
              FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_PAYMENT_TRANSACTION') }} AS PMT, VARS
              WHERE PMT.ACA_SOURCE_SYSTEM_ID = VARS.SOURCE_SYSTEM_ID_ESIS AND PMT.ACA_DATE_UPDATED > VARS.LAST_LOAD_DATE AND PMT.TRANSACTION_DATE >= VARS.REPROCESS_START_TRANSACTION_DATE
              GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE

              UNION

              SELECT SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, RECOVERY_TRANSACTION_DATE AS TRANSACTION_DATE, ACA_DATE_ID_RECOVERY_TRANSACTION_DATE AS ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE, MAX(RESERVE_TYPE) AS RESERVE_TYPE
              FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_RECOVERY_TRANSACTION') }} AS REC, VARS
              WHERE REC.ACA_SOURCE_SYSTEM_ID = VARS.SOURCE_SYSTEM_ID_ESIS AND REC.ACA_DATE_UPDATED > VARS.LAST_LOAD_DATE AND REC.RECOVERY_TRANSACTION_DATE >= VARS.REPROCESS_START_TRANSACTION_DATE
              GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, RECOVERY_TRANSACTION_DATE, ACA_DATE_ID_RECOVERY_TRANSACTION_DATE, COVERAGE_GROUP_CODE

              UNION

              SELECT SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE, MAX(RESERVE_TYPE) AS RESERVE_TYPE
              FROM {{ ref('SRC-ASTRUS', 'ACA_RESERVE_TRANSACTION') }} AS RES, VARS
              WHERE RES.ACA_SOURCE_SYSTEM_ID = VARS.SOURCE_SYSTEM_ID_ESIS AND RES.ACA_DATE_UPDATED > VARS.LAST_LOAD_DATE AND RES.TRANSACTION_DATE >= VARS.REPROCESS_START_TRANSACTION_DATE
              GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE
            ) AS U
        name: COMBINED_SOURCE_TRANSACTIONS
        noLinkRefs: []
