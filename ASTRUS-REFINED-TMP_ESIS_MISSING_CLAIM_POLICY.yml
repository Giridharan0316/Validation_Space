name: TMP_ESIS_MISSING_CLAIM_POLICY
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-


      -- Update BK, Dim FKs, Regular Columns and Audit Columns
      UPDATE "AUS_DEV_RAW"."SNAPSHOT"."ACA_RESERVE_TRANSACTION_STAGING_ESIS" AS T
      SET 
        T.SOURCE_SYSTEM_RESERVE_TRANSACTION_ID = SOURCE.NEW_SOURCE_SYSTEM_RESERVE_TRANSACTION_ID,
        T.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
        T.ACA_RESERVE_TYPE_ID = SOURCE.NEW_ACA_RESERVE_TYPE_ID,
        T.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,
        T.ACA_DATE_ID_TRANSACTION_DATE = SOURCE.NEW_ACA_DATE_ID_TRANSACTION_DATE,
        T.POLICY_NUMBER = SOURCE.NEW_POLICY_NUMBER,
        T.POLICY_EFFECTIVE_DATE = SOURCE.NEW_POLICY_EFFECTIVE_DATE,
        T.COVERAGE_GROUP_CODE = SOURCE.NEW_COVERAGE_GROUP_CODE,
        T.RESERVE_TYPE = SOURCE.NEW_RESERVE_TYPE,
        T.ACA_SOURCE_SYSTEM_ID = SOURCE.NEW_ACA_SOURCE_SYSTEM_ID,
        T.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED,
        T.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER
      FROM (
        SELECT 
          
          MD5(CONCAT('<row unique_claim_id="', COALESCE(CAST(T_INNER.SOURCE_SYSTEM_CLAIM_ID AS VARCHAR), ''), '" transaction_date="', COALESCE(CAST(T_INNER.TRANSACTION_DATE AS VARCHAR), ''), '" transaction_sequence_number="', COALESCE(CAST(T_INNER.TRANSACTION_SEQUENCE_NUMBER AS VARCHAR), ''), '" reserve_type="', COALESCE(CAST(RT.TRANSACTION_GROUP AS VARCHAR), ''), '"/>'))::BINARY(16) AS NEW_SOURCE_SYSTEM_RESERVE_TRANSACTION_ID,
          
          COALESCE(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
          COALESCE(RT.ACA_RESERVE_TYPE_ID, -1) AS NEW_ACA_RESERVE_TYPE_ID,
          COALESCE(T_INNER.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,
          TRY_CAST(TO_CHAR(T_INNER.TRANSACTION_DATE, 'YYYYMMDD') AS NUMBER(10,0)) AS NEW_ACA_DATE_ID_TRANSACTION_DATE,
          COALESCE(T_INNER.POLICY_NUMBER, MC.POLICY_NUMBER) AS NEW_POLICY_NUMBER,
          COALESCE(T_INNER.POLICY_EFFECTIVE_DATE, MC.EFFECTIVE_DATE) AS NEW_POLICY_EFFECTIVE_DATE,
          COALESCE(T_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE) AS NEW_COVERAGE_GROUP_CODE,
          RT.TRANSACTION_GROUP AS NEW_RESERVE_TYPE,
          
          (SELECT ACA_SOURCE_SYSTEM_ID FROM "AUS_DEV_RAW"."SNAPSHOT"."ACA_SOURCE_SYSTEM" WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM "AUS_DEV_RAW"."SNAPSHOT"."ACA_RESERVE_TRANSACTION_STAGING_ESIS")) AS NEW_ACA_SOURCE_SYSTEM_ID,
          CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED,
          'spaca_aca_reserve_transaction_staging_esis_update' AS NEW_ACA_UPDATE_USER

        FROM "AUS_DEV_RAW"."SNAPSHOT"."ACA_RESERVE_TRANSACTION_STAGING_ESIS" AS T_INNER
        LEFT JOIN "AUS_DEV_RAW"."SNAPSHOT"."ACA_CLAIM" AS C
          ON C.SOURCE_SYSTEM_CLAIM_ID = T_INNER.SOURCE_SYSTEM_CLAIM_ID
        LEFT JOIN "AUS_DEV_RAW"."SNAPSHOT"."ACA_POLICY" AS PO
          ON PO.SOURCE_SYSTEM_POLICY_ID = T_INNER.SOURCE_SYSTEM_POLICY_ID
        LEFT JOIN "AUS_DEV_REFINED"."PUBLIC"."TMP_ESIS_MISSING_CLAIM_POLICY" AS MC
          ON MC.SOURCE_SYSTEM_CLAIM_ID = T_INNER.SOURCE_SYSTEM_CLAIM_ID
        LEFT JOIN "AUS_DEV_RAW"."SNAPSHOT"."ACA_RESERVE_TYPE_MAPPING" AS RT
          ON RT.PAYMENT_TYPE_CODE = T_INNER.PAYMENT_TYPE_CODE
          AND RT.COVERAGE_GROUP_CODE = COALESCE(T_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
          AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM "AUS_DEV_RAW"."SNAPSHOT"."ACA_SOURCE_SYSTEM" WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM "AUS_DEV_RAW"."SNAPSHOT"."ACA_RESERVE_TRANSACTION_STAGING_ESIS"))
      ) AS SOURCE;
    preSQL: |-
      BEGIN
        SET sourceSystemIdEsis = (
          SELECT ACA_SOURCE_SYSTEM_ID 
          FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }}
          WHERE SOURCE_SYSTEM = (
            SELECT MAX(SOURCE_SYSTEM) 
            FROM {{ref('SRC-ASTRUS','ACA_RESERVE_TRANSACTION_STAGING_ESIS')}}
          )
        );
      END;
    testsEnabled: true
    truncateBefore: true
