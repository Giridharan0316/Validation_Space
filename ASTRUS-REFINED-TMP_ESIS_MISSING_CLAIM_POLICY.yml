            FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM')}} AS C
            INNER JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }} AS CT
              ON CT.ACA_CLAIM_ID = C.ACA_CLAIM_ID
