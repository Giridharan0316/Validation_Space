operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          UPDATE {{ref('ASTRUS-REFINED','ACA_POLICY_ESIS')}} AS T
          SET 
              T.ACA_DATE_ID_EXPIRATION_DATE = CAST(TO_VARCHAR(S.EXPIRATION_DATE, 'YYYYMMDD') AS INT),
              T.EXPIRATION_DATE = S.EXPIRATION_DATE,
              T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              T.ACA_UPDATE_USER = 'spaca_aca_policy_esis_insertUpdate'
          FROM {{ ref('SRC-ASTRUS', 'ACA_POLICY_STAGING_ESIS') }} AS S
          WHERE T.SOURCE_SYSTEM_POLICY_ID = S.SOURCE_SYSTEM_POLICY_ID
            AND T.ACA_SOURCE_SYSTEM_ID = S.ACA_SOURCE_SYSTEM_ID
            AND T.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
            AND IFNULL(T.EXPIRATION_DATE, CAST('1776-07-04' AS DATE)) <> IFNULL(S.EXPIRATION_DATE, CAST('1776-07-04' AS DATE));
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: false
