            FROM (
              SELECT PMT.SOURCE_SYSTEM_CLAIM_ID, PMT.ACA_RESERVE_TYPE_ID, C.TRANSACTION_DATE, MAX(PMT.COVERAGE_GROUP_CODE) AS COVERAGE_GROUP_CODE, MAX(PMT.RESERVE_TYPE) AS RESERVE_TYPE, SUM(PMT.PAYMENT_AMOUNT_BY_RESERVE_TYPE) AS PAYMENT_AMOUNT
              FROM {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_TRANSACTION') }} AS PMT
              INNER JOIN {{ ref('ASTRUS-REFINED', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION') }} AS C ON C.SOURCE_SYSTEM_CLAIM_ID = PMT.SOURCE_SYSTEM_CLAIM_ID AND C.ACA_RESERVE_TYPE_ID = PMT.ACA_RESERVE_TYPE_ID
