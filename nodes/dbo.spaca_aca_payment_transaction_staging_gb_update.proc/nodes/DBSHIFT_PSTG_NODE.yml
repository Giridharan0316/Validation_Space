operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_GB AS P\n    SET\n        P.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,\n        P.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,\n        P.ACA_PAYMENT_ATTRIBUTE_ID = SOURCE.NEW_ACA_PAYMENT_ATTRIBUTE_ID,\n        P.ACA_PAYEE_ID = SOURCE.NEW_ACA_PAYEE_ID,\n        P.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),\n        P.ACA_UPDATE_USER = 'spaca_aca_payment_transaction_staging_gb_update'\n    FROM (\n        SELECT\n            P_INNER.SOURCE_SYSTEM_CLAIM_ID,\n            P_INNER.SOURCE_SYSTEM_POLICY_ID,\n            P_INNER.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID,\n            P_INNER.SOURCE_SYSTEM_PAYEE_ID,\n            IFNULL(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,\n            IFNULL(PO.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,\n            IFNULL(PA.ACA_PAYMENT_ATTRIBUTE_ID, -1) AS NEW_ACA_PAYMENT_ATTRIBUTE_ID,\n            IFNULL(PE.ACA_PAYEE_ID, -1) AS NEW_ACA_PAYEE_ID\n        FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_GB\
      \ AS P_INNER\n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C ON C.SOURCE_SYSTEM_CLAIM_ID = P_INNER.SOURCE_SYSTEM_CLAIM_ID\n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY AS PO ON PO.SOURCE_SYSTEM_POLICY_ID = P_INNER.SOURCE_SYSTEM_POLICY_ID\n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_ATTRIBUTE AS PA ON PA.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID = P_INNER.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID\n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYEE AS PE ON PE.SOURCE_SYSTEM_PAYEE_ID = P_INNER.SOURCE_SYSTEM_PAYEE_ID\n    ) AS SOURCE\n    WHERE\n        (P.SOURCE_SYSTEM_CLAIM_ID = SOURCE.SOURCE_SYSTEM_CLAIM_ID OR (P.SOURCE_SYSTEM_CLAIM_ID IS NULL AND SOURCE.SOURCE_SYSTEM_CLAIM_ID IS NULL)) AND\n        (P.SOURCE_SYSTEM_POLICY_ID = SOURCE.SOURCE_SYSTEM_POLICY_ID OR (P.SOURCE_SYSTEM_POLICY_ID IS NULL AND SOURCE.SOURCE_SYSTEM_POLICY_ID IS NULL)) AND\n        (P.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID = SOURCE.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID OR (P.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID\
      \ IS NULL AND SOURCE.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID IS NULL)) AND\n        (P.SOURCE_SYSTEM_PAYEE_ID = SOURCE.SOURCE_SYSTEM_PAYEE_ID OR (P.SOURCE_SYSTEM_PAYEE_ID IS NULL AND SOURCE.SOURCE_SYSTEM_PAYEE_ID IS NULL));\nEND;"
    testsEnabled: true
    truncateBefore: false
