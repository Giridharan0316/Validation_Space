operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIM_ASTRUS_STAGE_SRC;
      UPDATE ALLIANT_CLAIM_ASTRUS_STAGE_SRC.PUBLIC.ACA_TRANSACTION_PAYMENT_STAGING
      SET
          UNIQUE_CLAIM_ID = CONCAT(CLIENT_NUMBER, '-', ACCIDENT_NUMBER, '-', CLAIM_COVERAGE_CODE, '-', CLAIM_SEQUENCE_NUMBER),
          PAYMENT_TRANSACTION_DATE = CASE WHEN TRANSACTION_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(TRANSACTION_YEAR, TRANSACTION_MONTH, TRANSACTION_DAY) END,
          POLICY_EFFECTIVE_DATE = CASE WHEN POLICY_EFFECTIVE_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(POLICY_EFFECTIVE_YEAR, POLICY_EFFECTIVE_MONTH, POLICY_EFFECTIVE_DAY) END,
          POLICY_EXPIRATION_DATE = CASE WHEN POLICY_EXPIRATION_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(POLICY_EXPIRATION_YEAR, POLICY_EXPIRATION_MONTH, POLICY_EXPIRATION_DAY) END,
          PAYMENT_DATE = CASE WHEN PAYMENT_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(PAYMENT_YEAR, PAYMENT_MONTH, PAYMENT_DAY) END,
          PAYMENT_ENTRY_DATE = CASE WHEN PAYMENT_ENTRY_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(PAYMENT_ENTRY_YEAR, PAYMENT_ENTRY_MONTH, PAYMENT_ENTRY_DAY) END,
          PAYEE_ADDRESS = CONCAT(PAYEE_ADDRESSLINE_ONE, PAYEE_ADDRESSLINE_TWO, PAYEE_ADDRESSLINE_THREE),
          PAYEE_ZIPCODE = CASE WHEN PAYEE_ZIPCODE_LASTFOURPOSITIONS <> '' THEN CONCAT(PAYEE_ZIPCODE_FIRSTFIVEPOSITIONS, '-', PAYEE_ZIPCODE_LASTFOURPOSITIONS) ELSE PAYEE_ZIPCODE_FIRSTFIVEPOSITIONS END,
          MAIL_TO_ZIPCODE = CASE WHEN MAIL_TO_ZIPCODE_LASTFOURPOSITIONS <> '' THEN CONCAT(MAIL_TO_ZIPCODE_FIRSTFIVEPOSITIONS, '-', MAIL_TO_ZIPCODE_LASTFOURPOSITIONS) ELSE MAIL_TO_ZIPCODE_FIRSTFIVEPOSITIONS END,
          SERVICE_END_DATE = CASE WHEN SERVICE_END_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(SERVICE_END_YEAR, SERVICE_END_MONTH, SERVICE_END_DAY) END,
          SERVICE_START_DATE = CASE WHEN SERVICE_START_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(SERVICE_START_YEAR, SERVICE_START_MONTH, SERVICE_START_DAY) END,
          BENEFIT_END_DATE = CASE WHEN BENEFIT_END_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(BENEFIT_END_YEAR, BENEFIT_END_MONTH, BENEFIT_END_DAY) END,
          BENEFIT_START_DATE = CASE WHEN BENEFIT_START_YEAR = '0000' THEN NULL ELSE DATE_FROM_PARTS(BENEFIT_START_YEAR, BENEFIT_START_MONTH, BENEFIT_START_DAY) END,
          RESERVE_AMT1 = CASE WHEN RESERVE_AMT1 LIKE '%-%' THEN CAST(ABS(RESERVE_AMT1) / 100 AS DECIMAL(16, 2)) * -1 ELSE CAST(ABS(RESERVE_AMT1) / 100 AS DECIMAL(16, 2)) END,
          RESERVE_AMT2 = CASE WHEN RESERVE_AMT2 LIKE '%-%' THEN CAST(ABS(RESERVE_AMT2) / 100 AS DECIMAL(16, 2)) * -1 ELSE CAST(ABS(RESERVE_AMT2) / 100 AS DECIMAL(16, 2)) END,
          RESERVE_AMT3 = CASE WHEN RESERVE_AMT3 LIKE '%-%' THEN CAST(ABS(RESERVE_AMT3) / 100 AS DECIMAL(16, 2)) * -1 ELSE CAST(ABS(RESERVE_AMT3) / 100 AS DECIMAL(16, 2)) END,
          RESERVE_AMT4 = CASE WHEN RESERVE_AMT4 LIKE '%-%' THEN CAST(ABS(RESERVE_AMT4) / 100 AS DECIMAL(16, 2)) * -1 ELSE CAST(ABS(RESERVE_AMT4) / 100 AS DECIMAL(16, 2)) END,
          RESERVE_AMT5 = CASE WHEN RESERVE_AMT5 LIKE '%-%' THEN CAST(ABS(RESERVE_AMT5) / 100 AS DECIMAL(16, 2)) * -1 ELSE CAST(ABS(RESERVE_AMT5) / 100 AS DECIMAL(16, 2)) END,
          RESERVE_AMT6 = CASE WHEN RESERVE_AMT6 LIKE '%-%' THEN CAST(ABS(RESERVE_AMT6) / 100 AS DECIMAL(16, 2)) * -1 ELSE CAST(ABS(RESERVE_AMT6) / 100 AS DECIMAL(16, 2)) END,
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'spaca_aca_transaction_payment_staging_update';
      END;
