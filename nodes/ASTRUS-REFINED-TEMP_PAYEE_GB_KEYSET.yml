        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ACA_TRANSACTION_PAYMENT') }} AS ATP
            CROSS JOIN (
                SELECT COALESCE(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) AS LAST_LOAD_DATE
                FROM {{ ref('SRC-ASTRUS', 'ACA_PAYEE_GB') }}
                WHERE ACA_PAYEE_GB_ID <> -1
            ) AS LLD
            CROSS JOIN (
                SELECT TRANSACTION_DATE AS TRANSACTION_DATE_CURRENT
                FROM {{ ref('SRC-ASTRUS', 'V_ACA_TRANSACTION_DATE_CURRENT') }}
                WHERE SOURCE_SYSTEM = 'GB'
            ) AS TDC
            WHERE ATP.ACA_DATE_UPDATED > LLD.LAST_LOAD_DATE AND ATP.PAYMENT_TRANSACTION_DATE > TDC.TRANSACTION_DATE_CURRENT
