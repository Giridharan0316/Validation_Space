      join:
        joinCondition: 'FROM {{ ref(''SRC-ASTRUS'', ''ACA_PYRAMID'') }} PD

          INNER JOIN {{ ref(''ASTRUS-PRESENTATION'', ''VW_REPORTING_UNIT_LEVEL'') }} LVL ON LVL.CLIENT = PD.CLIENT AND LVL.UNIT_ID = PD.UNIT_ID AND LVL.REPORTING_UNIT_LEVEL = PD.LEVEL

