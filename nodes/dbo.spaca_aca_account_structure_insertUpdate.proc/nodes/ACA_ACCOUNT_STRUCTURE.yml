name: ACA_ACCOUNT_STRUCTURE
operation:
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    --Update if anything has changed (non-key columns)\n    UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE AS a\n    SET\n        a.division_id = stg.division_id,\n        a.division_name = stg.division_name,\n        a.subsidiary_id = stg.subsidiary_id,\n        a.subsidiary_name = stg.subsidiary_name,\n        a.location_id = stg.location_id,\n        a.location_name = stg.location_name,\n        aca_date_updated = CURRENT_TIMESTAMP(),\n        aca_update_user = 'spaca_aca_account_structure_insertUpdate'\n    FROM {{ ref('DBSHIFT', 'ACA_ACCOUNT_STRUCTURE_STAGING') }} AS stg\n    WHERE a.source_system_account_structure_id = stg.source_system_account_structure_id\n    AND a.aca_date_created <> CURRENT_TIMESTAMP() --don't update newly created rows\n    AND (\n        IFNULL(a.division_id, '-1') <> IFNULL(stg.division_id, '-1')\n        OR IFNULL(a.division_name, '-1') <> IFNULL(stg.division_name, '-1')\n        OR IFNULL(a.subsidiary_id, '-1') <> IFNULL(stg.subsidiary_id,\
      \ '-1')\n        OR IFNULL(a.subsidiary_name, '-1') <> IFNULL(stg.subsidiary_name, '-1')\n        OR IFNULL(a.location_id, '-1') <> IFNULL(stg.location_id, '-1')\n        OR IFNULL(a.location_name, '-1') <> IFNULL(stg.location_name, '-1')\n    );\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: false
