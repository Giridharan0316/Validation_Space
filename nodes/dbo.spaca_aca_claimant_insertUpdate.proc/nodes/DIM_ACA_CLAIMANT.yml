name: DIM_ACA_CLAIMANT
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
        USE DATABASE ALLIANT_CLAIMS_ASTRUS;
        UPDATE
          ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT AS C
        SET
          C.ACA_EMPLOYMENT_STATUS_ID = B.ACA_EMPLOYMENT_STATUS_ID,
          C.ACA_MARITAL_STATUS_ID = B.ACA_MARITAL_STATUS_ID,
          C.ADDRESS_ENCRYPTED = B.ADDRESS_ENCRYPTED,
          C.CITY = B.CITY,
          C.STATE_CODE = B.STATE_CODE,
          C.COUNTRY_CODE = B.COUNTRY_CODE,
          C.ZIP_CODE = B.ZIP_CODE,
          C.AGE = B.AGE,
          C.GENDER = B.GENDER,
          C.SSN_ENCRYPTED = B.SSN_ENCRYPTED,
          C.AVERAGE_WEEKLY_WAGE = B.AVERAGE_WEEKLY_WAGE,
          C.NCCI_JOB_CLASSIFICATION_CODE = B.NCCI_JOB_CLASSIFICATION_CODE,
          C.LENGTH_OF_SERVICE_IN_YEAR = B.LENGTH_OF_SERVICE_IN_YEAR,
          C.PHONE_ENCRYPTED = B.PHONE_ENCRYPTED,
          C.HIRE_DATE = B.HIRE_DATE,
          C.EMPLOYMENT_STATUS_CODE = B.EMPLOYMENT_STATUS_CODE,
          C.EMPLOYMENT_STATUS = B.EMPLOYMENT_STATUS,
          C.BIRTH_DATE = B.BIRTH_DATE,
          C.MARITAL_STATUS_CODE = B.MARITAL_STATUS_CODE,
          C.MARITAL_STATUS = B.MARITAL_STATUS,
          C.OCCUPATION = B.OCCUPATION,
          C.EMPLOYEE_NUMBER = B.EMPLOYEE_NUMBER,
          C.ACA_SOURCE_SYSTEM_ID_WINNER = B.ACA_SOURCE_SYSTEM_ID_WINNER,
          C.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          C.ACA_UPDATE_USER = 'spaca_aca_claimant_insertUpdate'
        FROM
          {{ ref('DBSHIFT', 'ACA_CLAIMANT_STAGING') }} AS B
        WHERE
          B.SOURCE_SYSTEM_CLAIMANT_ID = C.SOURCE_SYSTEM_CLAIMANT_ID
          AND C.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
          AND (
            IFNULL(B.ACA_EMPLOYMENT_STATUS_ID, -1) <> IFNULL(C.ACA_EMPLOYMENT_STATUS_ID, -1)
            OR IFNULL(B.ACA_MARITAL_STATUS_ID, -1) <> IFNULL(C.ACA_MARITAL_STATUS_ID, -1)
            OR IFNULL(B.ADDRESS_ENCRYPTED, X'') <> IFNULL(C.ADDRESS_ENCRYPTED, X'')
            OR IFNULL(B.CITY, '') <> IFNULL(C.CITY, '')
            OR IFNULL(B.STATE_CODE, '') <> IFNULL(C.STATE_CODE, '')
            OR IFNULL(B.COUNTRY_CODE, '') <> IFNULL(C.COUNTRY_CODE, '')
            OR IFNULL(B.ZIP_CODE, '') <> IFNULL(C.ZIP_CODE, '')
            OR IFNULL(B.AGE, 0) <> IFNULL(C.AGE, 0)
            OR IFNULL(B.GENDER, '') <> IFNULL(C.GENDER, '')
            OR IFNULL(B.AVERAGE_WEEKLY_WAGE, 0.00) <> IFNULL(C.AVERAGE_WEEKLY_WAGE, 0.00)
            OR IFNULL(B.NCCI_JOB_CLASSIFICATION_CODE, '') <> IFNULL(C.NCCI_JOB_CLASSIFICATION_CODE, '')
            OR IFNULL(B.LENGTH_OF_SERVICE_IN_YEAR, 0) <> IFNULL(C.LENGTH_OF_SERVICE_IN_YEAR, 0)
            OR IFNULL(B.PHONE_ENCRYPTED, X'') <> IFNULL(C.PHONE_ENCRYPTED, X'')
            OR IFNULL(B.HIRE_DATE, '1776-07-04'::DATE) <> IFNULL(C.HIRE_DATE, '1776-07-04'::DATE)
            OR IFNULL(B.EMPLOYMENT_STATUS_CODE, '') <> IFNULL(C.EMPLOYMENT_STATUS_CODE, '')
            OR IFNULL(B.EMPLOYMENT_STATUS, '') <> IFNULL(C.EMPLOYMENT_STATUS, '')
            OR IFNULL(B.BIRTH_DATE, '1776-07-04'::DATE) <> IFNULL(C.BIRTH_DATE, '1776-07-04'::DATE)
            OR IFNULL(B.MARITAL_STATUS_CODE, '') <> IFNULL(C.MARITAL_STATUS_CODE, '')
            OR IFNULL(B.MARITAL_STATUS, '') <> IFNULL(C.MARITAL_STATUS, '')
            OR IFNULL(B.OCCUPATION, '') <> IFNULL(C.OCCUPATION, '')
            OR IFNULL(B.EMPLOYEE_NUMBER, '') <> IFNULL(C.EMPLOYEE_NUMBER, '')
          );
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: false
