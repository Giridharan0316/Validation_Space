        join:
          joinCondition: |-
            FROM {{ ref('ASTRUS-REFINED', 'TMP_RECOVERY_RESERVE_TYPE_CURRENT_INSERT') }} T1
            PIVOT (
                SUM(RECOVERY_AMOUNT)
                FOR RESERVE_TYPE IN (
                     'B. I.'
                    ,'BUILDING'
                    ,'COLLISION'
                    ,'COMP'
                    ,'CONTENTS'
                    ,'EXPENSE'
                    ,'EXTD. COVG.'
                    ,'INDEMNITY'
                    ,'LOSS'
                    ,'MEDICAL'
                    ,'P. D.'
                    ,'REHAB'
                    ,'V & M.M.'
                    ,'WAGE LOSS'
                    ,'Zero (0)'
                )
            ) AS PVT (
                 UNIQUE_CLAIM_ID
                ,"B. I."
                ,BUILDING
                ,COLLISION
                ,COMP
                ,CONTENTS
                ,EXPENSE
                ,"EXTD. COVG."
                ,INDEMNITY
                ,LOSS
                ,MEDICAL
                ,"P. D."
                ,REHAB
                ,"V & M.M."
                ,"WAGE LOSS"
                ,"Zero (0)"
            );
