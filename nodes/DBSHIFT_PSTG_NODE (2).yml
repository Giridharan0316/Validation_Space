  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    USE DATABASE ALLIANT_ONE;\n\n    UPDATE ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING S\n    SET\n        DW_CLIENT_ID = SOURCE.NEW_DW_CLIENT_ID,\n        DW_POLICY_ID = SOURCE.NEW_DW_POLICY_ID,\n        SF_ACCOUNT_OWNER_ID = SOURCE.NEW_SF_ACCOUNT_OWNER_ID\n    FROM (\n        SELECT\n            S_INNER.EPIC_UNIQPOLICY,\n            S_INNER.EPIC_CLIENT_LOOKUP_CODE,\n            S_INNER.SFACCTID,\n            IFNULL(CC.DW_CLIENT_ID, -1) AS NEW_DW_CLIENT_ID,\n            IFNULL(PC.DW_POLICY_ID, -1) AS NEW_DW_POLICY_ID,\n            SA.OWNERID AS NEW_SF_ACCOUNT_OWNER_ID\n        FROM ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING AS S_INNER\n        LEFT JOIN ALLIANT_DW.DBO.DW_POLICY_CURRENT PC ON TRY_CAST(S_INNER.EPIC_UNIQPOLICY AS VARCHAR(50)) = PC.SOURCE_SYSTEM_POLICY_ID AND PC.SOURCE_SYSTEM = 'EPIC'\n        LEFT JOIN ALLIANT_DW.DBO.DW_CLIENT_CURRENT CC ON S_INNER.EPIC_CLIENT_LOOKUP_CODE = CC.LOOKUP_CODE\n        LEFT JOIN ALLIANT_DW.REF.SALESFORCE_ACCOUNT SA ON S_INNER.SFACCTID\
      \ = SA.ID\n    ) AS SOURCE\n    WHERE EQUAL_NULL(S.EPIC_UNIQPOLICY, SOURCE.EPIC_UNIQPOLICY)\n      AND EQUAL_NULL(S.EPIC_CLIENT_LOOKUP_CODE, SOURCE.EPIC_CLIENT_LOOKUP_CODE)\n      AND EQUAL_NULL(S.SFACCTID, SOURCE.SFACCTID);\nEND;"
    testsEnabled: true
    truncateBefore: false
