      - aliases: {}
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: SRC-ASTRUS
            nodeName: ACA_CLAIM
          - locationName: SRC-ASTRUS
            nodeName: ACA_CLAIM_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_PAYMENT_TRANSACTION_STAGING_ESIS
          - locationName: SRC-ASTRUS
            nodeName: ACA_POLICY
          - locationName: SRC-ASTRUS
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} C
            INNER JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }} CT 
              ON CT.ACA_CLAIM_ID = C.ACA_CLAIM_ID
            INNER JOIN {{ ref('SRC-ASTRUS', 'ACA_POLICY') }} P 
              ON P.ACA_POLICY_ID = CT.ACA_POLICY_ID
            WHERE CT.ACA_SOURCE_SYSTEM_ID = (
              SELECT ACA_SOURCE_SYSTEM_ID 
              FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} 
              WHERE SOURCE_SYSTEM = (
                SELECT MAX(SOURCE_SYSTEM) 
                FROM {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }}
              )
            )
            AND CT.ACA_CURRENT_FLAG = 'Y'
            AND CT.ACA_POLICY_ID <> -1
            AND C.SOURCE_SYSTEM_CLAIM_ID IN (
              SELECT DISTINCT SOURCE_SYSTEM_CLAIM_ID 
              FROM {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }} 
              WHERE SOURCE_SYSTEM_POLICY_ID IS NULL 
              OR CLAIM_COVERAGE_CODE IS NULL
            )
        name: TEMP_ESIS_MISSING_CLAIM_POLICY
        noLinkRefs: []
