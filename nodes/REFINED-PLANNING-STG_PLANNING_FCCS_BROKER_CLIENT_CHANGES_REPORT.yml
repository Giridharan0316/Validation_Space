operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
        -- DECLARE VARIABLES FROM PARAMETERS
        LET TO_RECIPIENT VARCHAR(255) := {{ parameters.TO_RECIPIENT }};
        LET COPY_RECIPIENT VARCHAR(255) := {{ parameters.COPY_RECIPIENT }};
        LET ENVIRONMENT VARCHAR(5) := {{ parameters.ENVIRONMENT }};
        LET MACHINE VARCHAR(100) := {{ parameters.MACHINE }};

        -- CHECK IF THE STAGED REPORT DATA (THIS NODE) HAS ROWS
        LET ROW_COUNT INT;
        SELECT COUNT(1) INTO :ROW_COUNT FROM {{ ref_no_link('PLANNING_ALLIANT_STG', 'STG_PLANNING_FCCS_BROKER_CLIENT_CHANGES_REPORT') }};

        LET SUBJECT_TEXT VARCHAR;
        LET TABLEHTML VARCHAR;
        LET SUBJECT VARCHAR;

        IF (:ROW_COUNT > 0) THEN
          SUBJECT_TEXT := 'Planning Cloud Dimension Changes';

          LET TABLE_ROWS VARCHAR;
          -- BUILD HTML TABLE ROWS FROM THE STAGED DATA
          SELECT LISTAGG(
              '<tr>' ||
              '<td>' || COALESCE(CHANGE_TYPE, ' ') || '</td>' ||
              '<td>' || COALESCE(DIMENSION_TYPE, ' ') || '</td>' ||
              '<td>' || COALESCE(ORIGINAL_PLANNING_ID, ' ') || '</td>' ||
              '<td>' || COALESCE(ORIGINAL_PLANNING_ALIAS, ' ') || '</td>' ||
              '<td>' || COALESCE(SOURCE_SYSTEM, ' ') || '</td>' ||
              '<td>' || COALESCE(PLANNING_ID, ' ') || '</td>' ||
              '<td>' || COALESCE(PLANNING_ALIAS, ' ') || '</td>' ||
              '<td>' || COALESCE(PARENT_PLANNING_ID, ' ') || '</td>' ||
              '<td>' || COALESCE(ORIGINAL_PARENT_PLANNING_ID, ' ') || '</td>' ||
              '<td>' || COALESCE(BEGIN_POST_DATE, ' ') || '</td>' ||
              '<td>' || COALESCE(END_POST_DATE, ' ') || '</td>' ||
              '<td>' || DW_DATE_CREATED_FORMATTED || '</td>' ||
              '</tr>', ''
          ) WITHIN GROUP (ORDER BY DW_DATE_CREATED_RAW, CHANGE_TYPE, CASE WHEN CHANGE_TYPE = 'PlanningAlias' THEN ORIGINAL_PLANNING_ALIAS ELSE DIMENSION_TYPE END, CASE WHEN CHANGE_TYPE = 'PlanningAlias' THEN DIMENSION_TYPE ELSE ORIGINAL_PLANNING_ID END)
          INTO :TABLE_ROWS
          FROM {{ ref_no_link('PLANNING_ALLIANT_STG', 'STG_PLANNING_FCCS_BROKER_CLIENT_CHANGES_REPORT') }};

          TABLEHTML := '<html><body><h1>Planning Cloud Dimension Changes</h1>' ||
                       '<table border="1" width="100%">' ||
                       '<tr bgcolor="silver"><td>Change Type</td><td>Dimension Type</td><td>Original Planning ID</td><td>Original Planning Alias</td><td>SourceSystem</td><td>Planning ID</td><td>Planning Alias</td><td>Parent ID</td><td>Original Parent ID</td><td>Begin Post Date</td><td>End Post Date</td><td>dw_date_created</td></tr>' ||
                       :TABLE_ROWS ||
                       '</table></body></html>';
        ELSE
          SUBJECT_TEXT := 'No Planning Cloud Dimension Changes To Report (EOM)';
          TABLEHTML := '<html><body><h1>No Planning Cloud Dimension Changes To Report (EOM)</h1></body></html>';
        END IF;

        SUBJECT := :ENVIRONMENT || ': ' || :MACHINE || ': ' || :SUBJECT_TEXT;

        -- PREPARE RECIPIENTS FOR SNOWFLAKE SYSTEM$SEND_EMAIL FUNCTION
        LET RECIPIENTS_ARRAY ARRAY := [];
        IF (:TO_RECIPIENT IS NOT NULL AND :TO_RECIPIENT != '') THEN
            RECIPIENTS_ARRAY := ARRAY_CAT(RECIPIENTS_ARRAY, SPLIT(:TO_RECIPIENT, ';'));
        END IF;
        IF (:COPY_RECIPIENT IS NOT NULL AND :COPY_RECIPIENT != '') THEN
            RECIPIENTS_ARRAY := ARRAY_CAT(RECIPIENTS_ARRAY, SPLIT(:COPY_RECIPIENT, ';'));
        END IF;

        -- SEND EMAIL IF THERE ARE RECIPIENTS, USING A PRE-CONFIGURED EMAIL INTEGRATION
        IF (ARRAY_SIZE(RECIPIENTS_ARRAY) > 0) THEN
            CALL SYSTEM$SEND_EMAIL(
                'COALESCE_EMAIL_INTEGRATION', -- ASSUMES AN INTEGRATION NAMED THIS EXISTS
                RECIPIENTS_ARRAY,
                :SUBJECT,
                :TABLEHTML,
                'text/html'
            );
        END IF;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
