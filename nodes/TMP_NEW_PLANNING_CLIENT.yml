  name: TMP_NEW_PLANNING_CLIENT
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    UPDATE {{ ref_no_link('PLANNING_ALLIANT_DBO', 'TMP_NEW_PLANNING_CLIENT')\
      \ }} AS TGT\n    SET \n        TGT.GROUP_ID = GRP.NEW_GROUP_ID,\n        TGT.GROUP_NAME\
      \ =  GRP.NEW_GROUP_ID || '_Client_Parent',\n        TGT.PARENT_PLANNING_ID =\
      \  GRP.NEW_GROUP_ID || '_Client_Parent'\n    FROM (\n        WITH PARAMS AS\
      \ (\n            SELECT\n                COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,\
      \ 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1) AS INT)), 0) AS MAX_GROUP_ID,\n\
      \                (\n                    SELECT COUNT(1) \n                 \
      \   FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }} \n      \
      \              WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_',\
      \ PARENT_PLANNING_ID) - 1) AS INT) = \n                        (SELECT COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,\
      \ 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1) AS INT)), 0) FROM {{ ref('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }})\n                ) AS COUNT_OF_MAX_GROUP_ID\n\
      \            FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }}\n\
      \        ),\n        NULL_GROUP_ROWS AS (\n            SELECT \n           \
      \     ROW_ID,\n                ROW_NUMBER() OVER (ORDER BY ROW_ID) AS RN\n \
      \           FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'TMP_NEW_PLANNING_CLIENT')\
      \ }}\n            WHERE GROUP_ID IS NULL\n        )\n        SELECT\n      \
      \      NGR.ROW_ID,\n            (\n                SELECT \n               \
      \     CASE \n                        WHEN P.MAX_GROUP_ID > 0 AND NGR.RN <= (300\
      \ - P.COUNT_OF_MAX_GROUP_ID) THEN P.MAX_GROUP_ID\n                        ELSE\
      \ P.MAX_GROUP_ID + CEIL((NGR.RN - GREATEST(0, (300 - P.COUNT_OF_MAX_GROUP_ID)))\
      \ / 300.0::FLOAT)\n                    END\n                FROM PARAMS AS P\n\
      \            ) AS NEW_GROUP_ID\n        FROM NULL_GROUP_ROWS AS NGR\n    ) AS\
      \ GRP\n    WHERE TGT.ROW_ID = GRP.ROW_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
