          joinCondition: "FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_ACTUALS_STAGING')\
            \ }} AS STG\nLEFT OUTER JOIN {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
            \ }} AS B ON STG.CLIENT_PLANNING_ID = B.PLANNING_ID\nWHERE STG.CLIENT_PLANNING_ID\
