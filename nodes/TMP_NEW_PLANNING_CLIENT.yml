  name: TMP_NEW_PLANNING_CLIENT
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    -- First UPDATE block to fill the last group\n    UPDATE\
      \ PLANNING_ALLIANT.STAGING.TMP_NEW_PLANNING_CLIENT AS TGT\n    SET\n       \
      \ TGT.GROUP_ID = SRC.MAX_GROUP_ID,\n        TGT.GROUP_NAME = SRC.MAX_GROUP_ID\
      \ || '_Client_Parent',\n        TGT.PARENT_PLANNING_ID = SRC.MAX_GROUP_ID ||\
      \ '_Client_Parent'\n    FROM (\n        SELECT\n            T.ROW_ID,\n    \
      \        (SELECT MAX(TRY_CAST(SUBSTRING(PFC.PARENT_PLANNING_ID, 1, POSITION('_'\
      \ IN PFC.PARENT_PLANNING_ID) - 1) AS INT)) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }} AS PFC) AS MAX_GROUP_ID\n        FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMP_NEW_PLANNING_CLIENT') }} AS T\n        WHERE T.GROUP_ID IS NULL\n   \
      \     QUALIFY ROW_NUMBER() OVER (ORDER BY T.ROW_ID) <= (\n            SELECT\
      \ 300 - COUNT(1)\n            FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
      \ }} AS PFC\n            WHERE TRY_CAST(SUBSTRING(PFC.PARENT_PLANNING_ID, 1,\
      \ POSITION('_' IN PFC.PARENT_PLANNING_ID) - 1) AS INT) = (\n               \
      \ SELECT MAX(TRY_CAST(SUBSTRING(PFC_INNER.PARENT_PLANNING_ID, 1, POSITION('_'\
      \ IN PFC_INNER.PARENT_PLANNING_ID) - 1) AS INT))\n                FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }} AS PFC_INNER\n            )\n    ) AS SRC\n   \
      \ WHERE TGT.ROW_ID = SRC.ROW_ID\n    AND (SELECT MAX(TRY_CAST(SUBSTRING(PFC.PARENT_PLANNING_ID,\
      \ 1, POSITION('_' IN PFC.PARENT_PLANNING_ID) - 1) AS INT)) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }} AS PFC) IS NOT NULL;\n\n    -- Second UPDATE block\
      \ for remaining rows\n    UPDATE PLANNING_ALLIANT.STAGING.TMP_NEW_PLANNING_CLIENT\
      \ AS TGT\n    SET\n        TGT.GROUP_ID = GRP.NEW_GROUP_ID,\n        TGT.GROUP_NAME\
      \ = GRP.NEW_GROUP_ID || '_Client_Parent',\n        TGT.PARENT_PLANNING_ID =\
      \ GRP.NEW_GROUP_ID || '_Client_Parent'\n    FROM (\n        SELECT\n       \
      \     T.ROW_ID,\n            COALESCE((\n                SELECT MAX(TRY_CAST(SUBSTRING(PFC.PARENT_PLANNING_ID,\
      \ 1, POSITION('_' IN PFC.PARENT_PLANNING_ID) - 1) AS INT))\n               \
      \ FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }} AS\
      \ PFC\n            ), 0) + 1 + FLOOR((ROW_NUMBER() OVER (ORDER BY T.ROW_ID)\
      \ - 1) / 300) AS NEW_GROUP_ID\n        FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMP_NEW_PLANNING_CLIENT') }} AS T\n        WHERE T.GROUP_ID IS NULL\n   \
      \ ) AS GRP\n    WHERE TGT.ROW_ID = GRP.ROW_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
