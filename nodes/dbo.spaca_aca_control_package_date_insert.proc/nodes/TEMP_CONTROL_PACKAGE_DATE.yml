    postSQL: "BEGIN\n  LET sqlInsert VARCHAR := '';\n  LET instanceId VARCHAR := {{ parameters.iInstanceId }};\n  LET sourceGroupId NUMBER(10,0) := {{ parameters.iSourceGroupId }};\n  \n  -- Build SQL Insert Source Table Date(s) to Temp Table\n  SELECT LISTAGG(\n      REPLACE(REPLACE(REPLACE(REPLACE(REPLACE('SELECT CAST({c} AS DATE) AS SOURCE_DATE FROM {d}.{s}.{t}{p}', \n      '{c}', DATE_COLUMN), \n      '{d}', DATABASE_NAME), \n      '{s}', SCHEMA_NAME), \n      '{t}', TABLE_NAME), \n      '{p}', COALESCE(BACKUP_TABLE_NAME_POSTFIX, '')),\n      ' UNION \\n'\n  ) INTO :sqlInsert\n  FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_CONTROL_PACKAGE_SOURCE_TABLE') }}\n  WHERE SOURCE_GROUP_ID = :sourceGroupId;\n\n  IF (:sqlInsert IS NOT NULL AND :sqlInsert != '') THEN\n      EXECUTE IMMEDIATE 'CREATE TEMPORARY TABLE TEMP_CONTROL_PACKAGE_DATE_DYN AS ' || :sqlInsert;\n      \n      -- Insert Source Table Date(s)\n      INSERT INTO ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE\n\
      \      (\n          INSTANCE_ID,\n          SOURCE_GROUP_ID,\n          SOURCE_DATE,\n          PROCESSED_FLAG,\n          ACA_DATE_CREATED,\n          ACA_CREATE_USER,\n          ACA_DATE_UPDATED,\n          ACA_UPDATE_USER\n      )\n      SELECT \n          :instanceId AS INSTANCE_ID,\n          :sourceGroupId AS SOURCE_GROUP_ID,\n          TMP.SOURCE_DATE AS SOURCE_DATE,\n          0 AS PROCESSED_FLAG,\n          CURRENT_TIMESTAMP() AS ACA_DATE_CREATED,\n          'SPACA_ACA_CONTROL_PACKAGE_DATE_INSERT' AS ACA_CREATE_USER,\n          CURRENT_TIMESTAMP() AS ACA_DATE_UPDATED,\n          'SPACA_ACA_CONTROL_PACKAGE_DATE_INSERT' AS ACA_UPDATE_USER\n      FROM TEMP_CONTROL_PACKAGE_DATE_DYN TMP\n      WHERE TMP.SOURCE_DATE NOT IN (\n          SELECT SOURCE_DATE \n          FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE \n          WHERE SOURCE_GROUP_ID = :sourceGroupId\n            AND SOURCE_DATE IS NOT NULL\n      )\n      ORDER BY TMP.SOURCE_DATE ASC;\n  END IF;\nEND;"
