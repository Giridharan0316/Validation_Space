            nodeName: ACA_CLAIMANT_GB
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_CLAIMANT_ESIS
        join:
          joinCondition: 'FROM {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'', ''ACA_CLAIMANT_GB'')
            }} AS GB

            INNER JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'', ''ACA_CLAIMANT_ESIS'')
            }} AS ESIS

            ON GB.SOURCE_SYSTEM_CLAIMANT_ID = ESIS.SOURCE_SYSTEM_CLAIMANT_ID

            AND CAST(GB.ACA_DATE_UPDATED AS DATE) = CAST(ESIS.ACA_DATE_UPDATED AS
            DATE)

            WHERE GB.ACA_CLAIMANT_GB_ID <> -1

            AND ESIS.ACA_CLAIMANT_ESIS_ID <> -1

            AND GB.ACA_DATE_UPDATED > (SELECT COALESCE(MAX(ACA_DATE_UPDATED), ''1776-07-04
