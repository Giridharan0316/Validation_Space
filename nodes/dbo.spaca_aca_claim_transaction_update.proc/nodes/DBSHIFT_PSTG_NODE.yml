  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS;\nUPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_TRANSACTION T\nSET\n    ACA_CLAIM_ID = IFF(\n        T.ACA_CLAIM_ID = -1,\n        (SELECT IFNULL(MAX(C.ACA_CLAIM_ID), -1)\n         FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM C\n         WHERE T.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID AND T.ACA_SOURCE_SYSTEM_ID = C.SOURCE_SYSTEM_ID),\n        T.ACA_CLAIM_ID\n    ),\n    ACA_POLICY_ID = IFF(\n        T.ACA_POLICY_ID = -1,\n        (SELECT IFNULL(MAX(P.ACA_POLICY_ID), -1)\n         FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY P\n         WHERE T.SOURCE_SYSTEM_POLICY_ID = P.SOURCE_SYSTEM_POLICY_ID),\n        T.ACA_POLICY_ID\n    ),\n    ACA_CLAIMANT_ID = IFF(\n        T.ACA_CLAIMANT_ID = -1,\n        (SELECT IFNULL(MAX(CL.ACA_CLAIMANT_ID), -1)\n         FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT CL\n         WHERE T.SOURCE_SYSTEM_CLAIMANT_ID = CL.SOURCE_SYSTEM_CLAIMANT_ID),\n        T.ACA_CLAIMANT_ID\n    ),\n    ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),\n\
      \    ACA_UPDATE_USER = 'spaca_aca_claim_transaction_update'\nWHERE\n    (T.ACA_CLAIM_ID = -1 AND T.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL)\n    OR (T.ACA_POLICY_ID = -1 AND T.SOURCE_SYSTEM_POLICY_ID IS NOT NULL)\n    OR (T.ACA_CLAIMANT_ID = -1 AND T.SOURCE_SYSTEM_CLAIMANT_ID IS NOT NULL);\nEND;"
    testsEnabled: true
    truncateBefore: false
