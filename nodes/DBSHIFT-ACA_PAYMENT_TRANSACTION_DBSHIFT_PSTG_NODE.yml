    preSQL: |+
      BEGIN
      UPDATE {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_TRANSACTION') }} AS P
      SET
          ACA_CLAIM_ID = C.ACA_CLAIM_ID,
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'dbo.spaca_aca_payment_transaction_update'
      FROM
          {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }}  AS C
      WHERE
          C.SOURCE_SYSTEM_CLAIM_ID = P.SOURCE_SYSTEM_CLAIM_ID
          AND P.ACA_CLAIM_ID = -1
          AND P.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL;
      END;



