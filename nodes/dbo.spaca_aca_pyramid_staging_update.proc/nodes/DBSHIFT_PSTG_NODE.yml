operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;\n\n    --Delete bad data, these are header rows. For some reason GB puts extra records with header values in the middle of the extract.\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PYRAMID_STAGING\n    WHERE LEVEL = 'LEVEL';\n\n    --Trim whitespace. Old school system obviously.\n    UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PYRAMID_STAGING AS ps\n    SET    ps.LEVEL = RTRIM(ps.LEVEL)\n          ,ps.UNIT_ID = RTRIM(ps.UNIT_ID)\n          ,ps.STATUS = RTRIM(ps.STATUS)\n          ,ps.UNIT_NAME = RTRIM(ps.UNIT_NAME)\n          ,ps.ADDRESS_1 = RTRIM(ps.ADDRESS_1)\n          ,ps.ADDRESS_2 = RTRIM(ps.ADDRESS_2)\n          ,ps.CITY = RTRIM(ps.CITY)\n          ,ps.STATE = RTRIM(ps.STATE)\n          ,ps.POSTAL_CODE = RTRIM(ps.POSTAL_CODE)\n          ,ps.INSURED = RTRIM(ps.INSURED)\n          ,ps.SUBSIDIARY = RTRIM(ps.SUBSIDIARY)\n          ,ps.LOCATION = RTRIM(ps.LOCATION)\n          ,ps.CLIENT = RTRIM(ps.CLIENT)\n       \
      \   ,ps.DATE = RTRIM(ps.DATE)\n          ,ps.LVLSEQ = RTRIM(ps.LVLSEQ)\n          ,ps.ASSOC = RTRIM(ps.ASSOC)\n          ,ps.LEVEL_NAME = RTRIM(ps.LEVEL_NAME)\n          ,ps.ACA_DATE_UPDATED = CURRENT_TIMESTAMP()\n          ,ps.ACA_UPDATE_USER = 'spaca_aca_pyramid_staging_update';\n\n    --How wonderful. Extract is pipe delimited with a pipe value inside \"Address_3 field shifting rows.\n    UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PYRAMID_STAGING\n    SET\n    ADDRESS_3 = CONCAT(ADDRESS_3, '-', CITY)\n        ,CITY = STATE\n        ,STATE = POSTAL_CODE\n        ,POSTAL_CODE = COUNTRY\n        ,COUNTRY = PHONE\n        ,PHONE = FAX\n        ,FAX = CONTACT_NAME\n        ,CONTACT_NAME = FEIN\n        ,FEIN = SIC\n        ,SIC = COUNTY\n        ,COUNTY = NAICS\n        ,NAICS = TWX\n        ,TWX = PAYROLL_INDICATOR\n        ,PAYROLL_INDICATOR = EFFECTIVE_DATE\n        ,EFFECTIVE_DATE = DEACTIVATE_DATE\n        ,DEACTIVATE_DATE = REASON\n        ,REASON = RRE\n        ,RRE = ASTRUS\n\
      \        ,ASTRUS = INSURED\n        ,INSURED = SUBSIDIARY\n        ,SUBSIDIARY = LOCATION\n        ,LOCATION = CLIENT\n        ,CLIENT = CLIENT_NAME\n        ,CLIENT_NAME = DATE\n        ,DATE = LVLSEQ\n        ,LVLSEQ = ASSOC\n        ,ASSOC =  SUBSTRING (LEVEL_NAME, 1, 1)\n        ,LEVEL_NAME = SUBSTRING (LEVEL_NAME, 7, 10)\n    WHERE DATE NOT LIKE '%/%';\n\nEND;"
    testsEnabled: true
    truncateBefore: false
  database: ALLIANT_CLAIMS_ASTRUS_STAGE
