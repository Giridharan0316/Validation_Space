name: TMP_ESIS_MISSING_CLAIM_POLICY
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS AS R
      SET
          R.SOURCE_SYSTEM_POLICY_ID                  = SRC.NEW_SOURCE_SYSTEM_POLICY_ID,
          R.ACA_CLAIM_ID                             = SRC.NEW_ACA_CLAIM_ID,
          R.ACA_RESERVE_TYPE_ID                      = SRC.NEW_ACA_RESERVE_TYPE_ID,
          R.ACA_POLICY_ID                            = SRC.NEW_ACA_POLICY_ID,
          R.SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID    = SRC.NEW_SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID,
          R.COVERAGE_GROUP_CODE                      = SRC.NEW_COVERAGE_GROUP_CODE,
          R.RESERVE_TYPE                             = SRC.NEW_RESERVE_TYPE,
          R.ACA_SOURCE_SYSTEM_ID                     = SRC.NEW_ACA_SOURCE_SYSTEM_ID,
          R.ACA_DATE_UPDATED                         = SRC.NEW_ACA_DATE_UPDATED,
          R.ACA_UPDATE_USER                          = SRC.NEW_ACA_UPDATE_USER
       
      FROM (
          SELECT
              -- ── Join keys (used in the WHERE clause below) ───────────
              R_INNER.SOURCE_SYSTEM_CLAIM_ID          AS JOIN_KEY_1,
              R_INNER.RECOVERY_TRANSACTION_DATE       AS JOIN_KEY_2,
              R_INNER.TRANSACTION_SEQUENCE_NUMBER     AS JOIN_KEY_3,
       
              -- ── Dim FKs & business columns ───────────────────────────
              COALESCE(R_INNER.SOURCE_SYSTEM_POLICY_ID, MC.SOURCE_SYSTEM_POLICY_ID)           AS NEW_SOURCE_SYSTEM_POLICY_ID,
              COALESCE(C.ACA_CLAIM_ID,    -1)                                                  AS NEW_ACA_CLAIM_ID,
              COALESCE(RT.ACA_RESERVE_TYPE_ID, -1)                                             AS NEW_ACA_RESERVE_TYPE_ID,
              COALESCE(R_INNER.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1)         AS NEW_ACA_POLICY_ID,
       
              -- ── Surrogate BK hash (mirrors SQL Server FOR XML RAW) ───
              -- MD5_BINARY produces BINARY(16), matching the original HASHBYTES('md5',…)
              MD5_BINARY(
                  '<row unique_claim_id="'              || COALESCE(R_INNER.SOURCE_SYSTEM_CLAIM_ID::VARCHAR,        '')
                  || '" recovery_transaction_date="'    || COALESCE(R_INNER.RECOVERY_TRANSACTION_DATE::VARCHAR,     '')
                  || '" transaction_sequence_number="'  || COALESCE(R_INNER.TRANSACTION_SEQUENCE_NUMBER::VARCHAR,   '')
                  || '" reserve_type="'                 || COALESCE(RT.TRANSACTION_GROUP::VARCHAR,                  '')
                  || '" />'
              )                                                                                AS NEW_SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID,
       
              COALESCE(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)                   AS NEW_COVERAGE_GROUP_CODE,
              RT.TRANSACTION_GROUP                                                             AS NEW_RESERVE_TYPE,
       
              -- ── Audit columns ─────────────────────────────────────────
              SS.ACA_SOURCE_SYSTEM_ID                                                          AS NEW_ACA_SOURCE_SYSTEM_ID,
              CURRENT_TIMESTAMP()                                                              AS NEW_ACA_DATE_UPDATED,
              'spaca_aca_recovery_transaction_staging_esis_update'                             AS NEW_ACA_UPDATE_USER
       
          FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }} AS R_INNER
       
          -- ── Source system (resolved once via JOIN, not repeated subqueries) ──
          -- ref link points to the Coalesce-managed ACA_SOURCE_SYSTEM node
          INNER JOIN {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} AS SS
              ON SS.SOURCE_SYSTEM = (
                     SELECT MAX(SOURCE_SYSTEM)
                     FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }}
                 )
       
          -- ── Claim dim ────────────────────────────────────────────────
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} AS C
              ON C.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID
       
          -- ── Policy dim (direct match) ─────────────────────────────────
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_POLICY') }} AS PO
              ON PO.SOURCE_SYSTEM_POLICY_ID = R_INNER.SOURCE_SYSTEM_POLICY_ID
       
          -- ── Missing-claim policy fallback ─────────────────────────────
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.TMP_ESIS_MISSING_CLAIM_POLICY AS MC
              ON MC.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID
       
          -- ── Reserve-type mapping ──────────────────────────────────────
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_RESERVE_TYPE_MAPPING') }} AS RT
              ON  RT.PAYMENT_TYPE_CODE    = R_INNER.PAYMENT_TYPE_CODE
              AND RT.COVERAGE_GROUP_CODE  = COALESCE(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
              AND RT.ACA_SOURCE_SYSTEM_ID = SS.ACA_SOURCE_SYSTEM_ID   -- reuses the JOIN above, no subquery
       
      ) AS SRC
       
      -- ── Row-matching predicate ────────────────────────────────────────
      -- EQUAL_NULL handles NULL-safe equality (Snowflake native)
      WHERE EQUAL_NULL(R.SOURCE_SYSTEM_CLAIM_ID,        SRC.JOIN_KEY_1)
        AND EQUAL_NULL(R.RECOVERY_TRANSACTION_DATE,      SRC.JOIN_KEY_2)
        AND EQUAL_NULL(R.TRANSACTION_SEQUENCE_NUMBER,    SRC.JOIN_KEY_3);
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
