name: TMP_ESIS_MISSING_CLAIM_POLICY
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      UPDATE {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }}
      SET
           -- Add Missing Claim Policy BK
           SOURCE_SYSTEM_POLICY_ID                  = COALESCE(R.SOURCE_SYSTEM_POLICY_ID, MC.SOURCE_SYSTEM_POLICY_ID)

           -- Add Dim FKs
          ,ACA_CLAIM_ID                             = COALESCE(C.ACA_CLAIM_ID, -1)
          ,ACA_RESERVE_TYPE_ID                      = COALESCE(RT.ACA_RESERVE_TYPE_ID, -1)
          ,ACA_POLICY_ID                            = COALESCE(R.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1)

           -- Add BK via MD5 Hash
          ,SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID    = MD5(
                                                          R.SOURCE_SYSTEM_CLAIM_ID  || '|' ||
                                                          CAST(R.RECOVERY_TRANSACTION_DATE AS VARCHAR) || '|' ||
                                                          CAST(R.TRANSACTION_SEQUENCE_NUMBER AS VARCHAR) || '|' ||
                                                          RT.TRANSACTION_GROUP
                                                      )

           -- Update Regular Columns
          ,COVERAGE_GROUP_CODE                      = COALESCE(R.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
          ,RESERVE_TYPE                             = RT.TRANSACTION_GROUP

           -- Update Lineage/Audit
          ,ACA_SOURCE_SYSTEM_ID                     = (
          SELECT ACA_SOURCE_SYSTEM_ID 
          FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }}
          WHERE SOURCE_SYSTEM = (
              SELECT MAX(SOURCE_SYSTEM) 
              FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }}
          )
      )
          ,ACA_DATE_UPDATED                         = CURRENT_TIMESTAMP()
          ,ACA_UPDATE_USER                          = 'spaca_aca_recovery_transaction_staging_esis_update'

      FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }} AS R
      LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} AS C
          ON C.SOURCE_SYSTEM_CLAIM_ID = R.SOURCE_SYSTEM_CLAIM_ID
      LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_POLICY') }} AS PO
          ON PO.SOURCE_SYSTEM_POLICY_ID = R.SOURCE_SYSTEM_POLICY_ID
      LEFT JOIN {{ ref('ASTRUS-REFINED', 'TMP_ESIS_MISSING_CLAIM_POLICY')}} AS MC
          ON MC.SOURCE_SYSTEM_CLAIM_ID = R.SOURCE_SYSTEM_CLAIM_ID
      LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_RESERVE_TYPE_MAPPING') }} AS RT
          ON RT.PAYMENT_TYPE_CODE = R.PAYMENT_TYPE_CODE
          AND RT.COVERAGE_GROUP_CODE = COALESCE(R.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
          AND RT.ACA_SOURCE_SYSTEM_ID = (
          SELECT ACA_SOURCE_SYSTEM_ID 
          FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }}
          WHERE SOURCE_SYSTEM = (
              SELECT MAX(SOURCE_SYSTEM) 
              FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }}
          )
      );
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
