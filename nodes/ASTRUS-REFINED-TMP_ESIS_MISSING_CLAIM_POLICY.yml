            AND CT.ACA_POLICY_ID <> -1
            AND C.SOURCE_SYSTEM_CLAIM_ID IN (
                SELECT DISTINCT SOURCE_SYSTEM_CLAIM_ID
                FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }}
                WHERE SOURCE_SYSTEM_POLICY_ID IS NULL
                OR COVERAGE_GROUP_CODE IS NULL
            );
