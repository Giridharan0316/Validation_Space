name: TMP_NEW_PLANNING_BROKER
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          UPDATE {{ ref('REFINED-PLANNING', 'TMP_NEW_PLANNING_BROKER') }} AS TGT
          SET
              TGT.GROUP_ID = SRC.NEW_GROUP_ID,
              TGT.GROUP_NAME = SRC.NEW_GROUP_ID || '_Producer_Parent',
              TGT.PARENT_PLANNING_ID = SRC.NEW_GROUP_ID || '_Producer_Parent'
          FROM (
              WITH PARAMS AS (
                  SELECT
                      COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS NUMBER(10,0))), 0) AS MAX_GROUP_ID,
                      300 AS BATCH_SIZE
                  FROM {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_BROKER') }}
              ),
              COUNT_MAX_GROUP AS (
                  SELECT COUNT(1) AS COUNT_OF_MAX_GROUP_ID
                  FROM {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_BROKER') }} B
                  CROSS JOIN PARAMS P
                  WHERE TRY_CAST(SUBSTRING(B.PARENT_PLANNING_ID, 1, POSITION('_' IN B.PARENT_PLANNING_ID) - 1) AS NUMBER(10,0)) = P.MAX_GROUP_ID
              ),
              UNASSIGNED_ROWS AS (
                  SELECT
                      ROW_ID,
                      ROW_NUMBER() OVER (ORDER BY ROW_ID) AS RN
                  FROM {{ ref('REFINED-PLANNING', 'TMP_NEW_PLANNING_BROKER') }}
                  WHERE GROUP_ID IS NULL
              )
              SELECT
                  UR.ROW_ID,
                  CASE
                      WHEN P.MAX_GROUP_ID > 0 AND UR.RN <= (P.BATCH_SIZE - C.COUNT_OF_MAX_GROUP_ID) 
                          THEN P.MAX_GROUP_ID
                      ELSE P.MAX_GROUP_ID + CEIL((UR.RN - CASE WHEN P.MAX_GROUP_ID > 0 THEN (P.BATCH_SIZE - C.COUNT_OF_MAX_GROUP_ID) ELSE 0 END) / P.BATCH_SIZE::FLOAT)
                  END AS NEW_GROUP_ID
              FROM UNASSIGNED_ROWS UR
              CROSS JOIN PARAMS P
              CROSS JOIN COUNT_MAX_GROUP C
          ) AS SRC
          WHERE TGT.ROW_ID = SRC.ROW_ID
              AND TGT.GROUP_ID IS NULL;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
