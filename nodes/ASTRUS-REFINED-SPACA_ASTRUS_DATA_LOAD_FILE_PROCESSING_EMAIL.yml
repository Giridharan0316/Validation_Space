name: SPACA_ASTRUS_DATA_LOAD_FILE_PROCESSING_EMAIL
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
        -- Parameters from the original stored procedure signature, using sample call values
        LET MACHINE VARCHAR(100) := 'DEV-SQLV16-01';
        LET FROM_RECIPIENT VARCHAR(100) := 'ssis@alliant';
        LET TO_RECIPIENT VARCHAR(100) := 'venkata.rajula@alliant.com';
        LET COPY_RECIPIENT VARCHAR(100) := NULL;

        LET TABLEHTML_ASTRUS VARCHAR;
        LET SUBJECT VARCHAR(500);
        LET CURRENT_DATE_VAR DATE := CAST(CURRENT_TIMESTAMP() AS DATE);
        LET RECORDS_FOUND BOOLEAN := FALSE;

        SELECT EXISTS (
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_PYRAMID_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
            UNION ALL
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_TRANSACTION_CLAIM_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
            UNION ALL
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_TRANSACTION_EXCESS_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
            UNION ALL
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_TRANSACTION_EXPERIENCE_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
            UNION ALL
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_TRANSACTION_HEADER_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
            UNION ALL
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_TRANSACTION_PAYMENT_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
            UNION ALL
            SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_TRANSACTION_THIRD_PARTY_RECOVERY_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR
        ) INTO :RECORDS_FOUND;

        IF (NOT :RECORDS_FOUND) THEN
            TABLEHTML_ASTRUS := '<html><body>' ||
                             '<h1>No Astrus(GB) Files for ASG Load Processing ' || TO_VARCHAR(:CURRENT_DATE_VAR) || '</h1>' ||
                             '</body></html>';
        END IF;

        IF (TABLEHTML_ASTRUS IS NOT NULL) THEN
            SUBJECT := :MACHINE || ': Astrus ASG Load Processing';

            LET FULL_RECIPIENTS VARCHAR := :TO_RECIPIENT;
            IF (:COPY_RECIPIENT IS NOT NULL) THEN
                FULL_RECIPIENTS := FULL_RECIPIENTS || ',' || :COPY_RECIPIENT;
            END IF;

            -- NOTE: The msdb.dbo.sp_send_dbmail procedure needs to be replaced with a
            --       Snowflake equivalent, such as a call to SYSTEM$SEND_EMAIL.
            --       This requires an email notification integration to be configured in Snowflake.
            --       Example: CALL SYSTEM$SEND_EMAIL('your_integration_name', :FULL_RECIPIENTS, :SUBJECT, :TABLEHTML_ASTRUS, 'HTML');

        END IF;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
