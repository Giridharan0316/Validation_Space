  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;\n\nUPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS AS R\nSET\n  R.SOURCE_SYSTEM_POLICY_ID = SOURCE.NEW_SOURCE_SYSTEM_POLICY_ID,\n  R.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,\n  R.ACA_RESERVE_TYPE_ID = SOURCE.NEW_ACA_RESERVE_TYPE_ID,\n  R.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,\n  R.SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID = SOURCE.NEW_SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID,\n  R.COVERAGE_GROUP_CODE = SOURCE.NEW_COVERAGE_GROUP_CODE,\n  R.RESERVE_TYPE = SOURCE.NEW_RESERVE_TYPE,\n  R.ACA_SOURCE_SYSTEM_ID = SOURCE.NEW_ACA_SOURCE_SYSTEM_ID,\n  R.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED,\n  R.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER\nFROM (\n  SELECT\n    R_INNER.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY_1,\n    R_INNER.RECOVERY_TRANSACTION_DATE AS JOIN_KEY_2,\n    R_INNER.TRANSACTION_SEQUENCE_NUMBER AS JOIN_KEY_3,\n    COALESCE(R_INNER.SOURCE_SYSTEM_POLICY_ID, MC.SOURCE_SYSTEM_POLICY_ID) AS NEW_SOURCE_SYSTEM_POLICY_ID,\n\
      \    COALESCE(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,\n    COALESCE(RT.ACA_RESERVE_TYPE_ID, -1) AS NEW_ACA_RESERVE_TYPE_ID,\n    COALESCE(R_INNER.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,\n    MD5_BINARY(CONCAT('<row unique_claim_id=\"', COALESCE(TO_VARCHAR(R_INNER.SOURCE_SYSTEM_CLAIM_ID), ''), '\" recovery_transaction_date=\"', COALESCE(TO_VARCHAR(R_INNER.RECOVERY_TRANSACTION_DATE), ''), '\" transaction_sequence_number=\"', COALESCE(TO_VARCHAR(R_INNER.TRANSACTION_SEQUENCE_NUMBER), ''), '\" reserve_type=\"', COALESCE(TO_VARCHAR(RT.TRANSACTION_GROUP), ''), '\" />')) AS NEW_SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID,\n    COALESCE(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE) AS NEW_COVERAGE_GROUP_CODE,\n    RT.TRANSACTION_GROUP AS NEW_RESERVE_TYPE,\n    (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS))\
      \ AS NEW_ACA_SOURCE_SYSTEM_ID,\n    CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED,\n    'spaca_aca_recovery_transaction_staging_esis_update' AS NEW_ACA_UPDATE_USER\n  FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS AS R_INNER\n  LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} AS C\n    ON C.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID\n  LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_POLICY') }} AS PO\n    ON PO.SOURCE_SYSTEM_POLICY_ID = R_INNER.SOURCE_SYSTEM_POLICY_ID\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.TMP_ESIS_MISSING_CLAIM_POLICY AS MC\n    ON MC.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_RESERVE_TYPE_MAPPING AS RT\n    ON RT.PAYMENT_TYPE_CODE = R_INNER.PAYMENT_TYPE_CODE\n    AND RT.COVERAGE_GROUP_CODE = COALESCE(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)\n    AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM')E_SYSTEM\
      \ = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS))\n) AS SOURCE\nWHERE EQUAL_NULL(R.SOURCE_SYSTEM_CLAIM_ID, SOURCE.JOIN_KEY_1)\n  AND EQUAL_NULL(R.RECOVERY_TRANSACTION_DATE, SOURCE.JOIN_KEY_2)\n  AND EQUAL_NULL(R.TRANSACTION_SEQUENCE_NUMBER, SOURCE.JOIN_KEY_3);\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
