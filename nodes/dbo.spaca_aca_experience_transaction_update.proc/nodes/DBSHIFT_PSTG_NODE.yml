    postSQL: ''
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS;\nUPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_EXPERIENCE_TRANSACTION p\nSET\n    p.ACA_CLAIM_ID = source.new_aca_claim_id,\n    p.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),\n    p.ACA_UPDATE_USER = 'spaca_aca_experience_transaction_update'\nFROM (\n    SELECT\n        c.ACA_CLAIM_ID AS new_aca_claim_id,\n        p.SOURCE_SYSTEM_CLAIM_ID\n    FROM\n        ALLIANT_CLAIMS_ASTRUS.DBO.ACA_EXPERIENCE_TRANSACTION AS P\n    INNER JOIN\n        ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C ON C.SOURCE_SYSTEM_CLAIM_ID = P.SOURCE_SYSTEM_CLAIM_ID\n    WHERE\n        P.ACA_CLAIM_ID = -1 AND P.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL\n) AS source\nWHERE p.SOURCE_SYSTEM_CLAIM_ID = source.SOURCE_SYSTEM_CLAIM_ID;\nEND;"
    testsEnabled: true
    truncateBefore: false
