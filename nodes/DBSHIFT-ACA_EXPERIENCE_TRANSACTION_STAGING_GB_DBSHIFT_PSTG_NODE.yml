    preSQL: |-
      BEGIN
          UPDATE {{ ref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION_STAGING_GB') }}
          SET 
              ACA_CLAIM_ID = COALESCE(C.ACA_CLAIM_ID, -1),
              ACA_POLICY_ID = COALESCE(PO.ACA_POLICY_ID, -1),
              ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              ACA_UPDATE_USER = 'dbo.spaca_aca_experience_transaction_staging_gb_update'
          FROM {{ ref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION_STAGING_GB') }} T
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} C
              ON C.SOURCE_SYSTEM_CLAIM_ID = T.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_POLICY') }} PO
              ON PO.SOURCE_SYSTEM_POLICY_ID = T.SOURCE_SYSTEM_POLICY_ID;
      END;
