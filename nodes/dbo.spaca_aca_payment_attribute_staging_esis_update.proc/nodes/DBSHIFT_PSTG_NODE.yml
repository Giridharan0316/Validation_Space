  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;\nMERGE INTO ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS AS TGT\nUSING (\n  SELECT\n    p.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS_SK, -- NOTE: This is an assumed surrogate key for the join condition. Please verify the actual primary key of the table.\n    ty.ACA_PAYMENT_TYPE_CODE_ESIS_ID,\n    pt.ACA_PAY_TO_CODE_ID,\n    mt.ACA_MAIL_TO_CODE_ID,\n    cs.ACA_CHECK_STOCK_TYPE_ID,\n    ty.PAYMENT_TYPE,\n    pt.PAY_TO,\n    mt.MAIL_TO,\n    cs.CHECK_STOCK_TYPE,\n    s.ACA_SOURCE_SYSTEM_ID\n  FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS AS p\n  LEFT JOIN (\n    SELECT\n      PAYMENT_TYPE_CODE,\n      MAX(ACA_PAYMENT_TYPE_CODE_ESIS_ID) AS ACA_PAYMENT_TYPE_CODE_ESIS_ID\n    FROM ALLIANT_CLAIMS_ASTRUS.REF.ACA_PAYMENT_TYPE_CODE_ESIS\n    GROUP BY\n      PAYMENT_TYPE_CODE\n  ) AS tym\n    ON tym.PAYMENT_TYPE_CODE = p.PAYMENT_TYPE_CODE\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_PAYMENT_TYPE_CODE_ESIS\
      \ AS ty\n    ON ty.ACA_PAYMENT_TYPE_CODE_ESIS_ID = tym.ACA_PAYMENT_TYPE_CODE_ESIS_ID\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_PAY_TO_CODE AS pt\n    ON pt.PAY_TO_CODE = p.PAY_TO_CODE\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_MAIL_TO_CODE AS mt\n    ON mt.MAIL_TO_CODE = p.MAIL_TO_CODE\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_CHECK_STOCK_TYPE AS cs\n    ON cs.CHECK_STOCK_TYPE_CODE = p.CHECK_STOCK_TYPE_CODE\n  LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM AS s\n    ON s.SOURCE_SYSTEM = p.SOURCE_SYSTEM\n) AS SRC\n  ON TGT.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS_SK = SRC.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS_SK\nWHEN MATCHED\nTHEN\nUPDATE SET\n  ACA_PAYMENT_TYPE_CODE_ID = SRC.ACA_PAYMENT_TYPE_CODE_ESIS_ID,\n  ACA_PAY_TO_CODE_ID = SRC.ACA_PAY_TO_CODE_ID,\n  ACA_MAIL_TO_CODE_ID = SRC.ACA_MAIL_TO_CODE_ID,\n  ACA_CHECK_STOCK_TYPE_ID = SRC.ACA_CHECK_STOCK_TYPE_ID,\n  PAYMENT_TYPE = SRC.PAYMENT_TYPE,\n  PAY_TO = SRC.PAY_TO,\n  MAIL_TO = SRC.MAIL_TO,\n  CHECK_STOCK_TYPE = SRC.CHECK_STOCK_TYPE,\n\
      \  ACA_SOURCE_SYSTEM_ID = SRC.ACA_SOURCE_SYSTEM_ID,\n  ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),\n  ACA_UPDATE_USER = 'dbo.spaca_aca_payment_attribute_staging_esis_update';\nEND"
    testsEnabled: true
    truncateBefore: false
