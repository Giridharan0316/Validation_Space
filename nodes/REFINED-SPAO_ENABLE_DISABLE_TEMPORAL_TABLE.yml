name: SPAO_ENABLE_DISABLE_TEMPORAL_TABLE
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          LET ds_table_name VARCHAR := '{{ parameters.DS_TABLE_NAME }}';
          LET action VARCHAR := '{{ parameters.ACTION }}';
          LET sql_statement VARCHAR := '';

          -- This procedure translates the intent of managing table history from SQL Server's Temporal Tables
          -- to Snowflake's Time Travel feature, which is controlled by DATA_RETENTION_TIME_IN_DAYS.
          -- The SQL Server parameter for a separate history table (@ds_table_name_history) is not applicable in Snowflake.

          IF (UPPER(:action) = 'ENABLE') THEN
              -- Enabling history in Snowflake is done by setting data retention for Time Travel.
              -- A value > 1 enables it beyond the default. 90 days is a common setting for history.
              sql_statement := 'ALTER TABLE IDENTIFIER(''' || :ds_table_name || ''') SET DATA_RETENTION_TIME_IN_DAYS = 90;';
          END IF;

          IF (UPPER(:action) = 'DISABLE') THEN
              -- Disabling extended history is done by setting data retention back to the default (1 day).
              sql_statement := 'ALTER TABLE IDENTIFIER(''' || :ds_table_name || ''') SET DATA_RETENTION_TIME_IN_DAYS = 1;';
          END IF;
          
          IF (sql_statement != '') THEN
              EXECUTE IMMEDIATE :sql_statement;
          END IF;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
