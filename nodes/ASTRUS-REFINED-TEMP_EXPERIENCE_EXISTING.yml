    sourceMapping:
      - aliases:
          C: C
          CC: CC
          RT: RT
          T: T
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: SRC-ASTRUS
            nodeName: ACA_EXPERIENCE_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_TRANSACTION_EXPERIENCE
          - locationName: SRC-ASTRUS
            nodeName: ACA_COVERAGE_CODE
          - locationName: SRC-ASTRUS
            nodeName: ACA_RESERVE_TYPE_MAPPING
          - locationName: SRC-ASTRUS
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION') }} AS T
            INNER JOIN (
                SELECT UNIQUE_CLAIM_ID, MIN(TO_CHAR(EXPERIENCE_TRANSACTION_DATE, 'YYYYMMDD')) AS ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE
                FROM {{ ref('SRC-ASTRUS', 'ACA_TRANSACTION_EXPERIENCE') }}
                WHERE ACA_DATE_UPDATED > IFF({{ parameters.iReprocessStartTransactionDate }} IS NULL, (SELECT COALESCE(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM {{ ref('ALLIANT_CLref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION') }} WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')), '1900-01-01'::DATE)
                AND EXPERIENCE_TRANSACTION_DATE >= COALESCE({{ parameters.iReprocessStartTransactionDate }}, '1900-01-01'::DATE)
                GROUP BY UNIQUE_CLAIM_ID
            ) AS C
            ON C.UNIQUE_CLAIM_ID = T.SOURCE_SYSTEM_CLAIM_ID
            AND C.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE > T.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE
            LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_COVERAGE_CODE') }} AS CC
            ON CC.CODE = T.COVERAGE_GROUP_CODE
            LEFT JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_REF', 'ACA_RESERVE_TYPE_MAPPING') }} AS RT
            ON RT.CLASS_CODE = CC.CLASS
            AND RT.RESERVE_TYPE = T.RESERVE_TYPE
            AND RT.ACA_SOURCE_SYSTEM_ID = T.ACA_SOURCE_SYSTEM_ID
            WHERE T.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')
            GROUP BY T.SOURCE_SYSTEM_CLAIM_ID, T.COVERAGE_GROUP_CODE
        name: TEMP_EXPERIENCE_EXISTING
        noLinkRefs: []
