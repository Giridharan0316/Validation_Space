    preSQL: |-
      BEGIN
          -- NOTE: The T-SQL encryption logic (OPEN SYMMETRIC KEY, ENCRYPTBYKEY) must be replaced with an
          -- equivalent Snowflake implementation, likely using a User-Defined Function (UDF).
          -- This script assumes a placeholder UDF `UDF_ENCRYPTBYKEY` and a primary key on the
          -- target table (e.g., ACA_PAYEE_STAGING_ESIS_ID) for a deterministic update.
          UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYEE_STAGING_ESIS AS TGT
          SET
              TGT.payee_encrypted = SOURCE.new_payee_encrypted,
              TGT.last_name_encrypted = SOURCE.new_last_name_encrypted,
              TGT.first_name_encrypted = SOURCE.new_first_name_encrypted,
              TGT.organization_encrypted = SOURCE.new_organization_encrypted,
              TGT.address_encrypted = SOURCE.new_address_encrypted,
              TGT.irs_tax_identification_number_encrypted = SOURCE.new_irs_tax_identification_number_encrypted,
              TGT.mail_to_encrypted = SOURCE.new_mail_to_encrypted,
              TGT.mail_to_last_name_encrypted = SOURCE.new_mail_to_last_name_encrypted,
              TGT.mail_to_first_name_encrypted = SOURCE.new_mail_to_first_name_encrypted,
              TGT.mail_to_organization_encrypted = SOURCE.new_mail_to_organization_encrypted,
              TGT.mail_to_address_encrypted = SOURCE.new_mail_to_address_encrypted,
              TGT.payee = NULL,
              TGT.last_name = NULL,
              TGT.first_name = NULL,
              TGT.organization = NULL,
              TGT.address = NULL,
              TGT.irs_tax_identification_number = NULL,
              TGT.mail_to = NULL,
              TGT.mail_to_last_name = NULL,
              TGT.mail_to_first_name = NULL,
              TGT.mail_to_organization = NULL,
              TGT.mail_to_address = NULL,
              TGT.aca_irs_form_1099_type_id = SOURCE.new_aca_irs_form_1099_type_id,
              TGT.irs_form_1099_type = SOURCE.new_irs_form_1099_type,
              TGT.aca_source_system_id = SOURCE.new_aca_source_system_id,
              TGT.aca_date_updated = CURRENT_TIMESTAMP(),
              TGT.aca_update_user = 'dbo.spaca_aca_payee_staging_esis_update'
          FROM (
              SELECT
                  p.ACA_PAYEE_STAGING_ESIS_ID, -- Assumed primary key for deterministic join
                  COALESCE(p.payee_encrypted, UDF_ENCRYPTBYKEY(p.payee)) AS new_payee_encrypted,
                  COALESCE(p.last_name_encrypted, UDF_ENCRYPTBYKEY(p.last_name)) AS new_last_name_encrypted,
                  COALESCE(p.first_name_encrypted, UDF_ENCRYPTBYKEY(p.first_name)) AS new_first_name_encrypted,
                  COALESCE(p.organization_encrypted, UDF_ENCRYPTBYKEY(p.organization)) AS new_organization_encrypted,
                  COALESCE(p.address_encrypted, UDF_ENCRYPTBYKEY(p.address)) AS new_address_encrypted,
                  COALESCE(p.irs_tax_identification_number_encrypted, UDF_ENCRYPTBYKEY(p.irs_tax_identification_number)) AS new_irs_tax_identification_number_encrypted,
                  COALESCE(p.mail_to_encrypted, UDF_ENCRYPTBYKEY(p.mail_to)) AS new_mail_to_encrypted,
                  COALESCE(p.mail_to_last_name_encrypted, UDF_ENCRYPTBYKEY(p.mail_to_last_name)) AS new_mail_to_last_name_encrypted,
                  COALESCE(p.mail_to_first_name_encrypted, UDF_ENCRYPTBYKEY(p.mail_to_first_name)) AS new_mail_to_first_name_encrypted,
                  COALESCE(p.mail_to_organization_encrypted, UDF_ENCRYPTBYKEY(p.mail_to_organization)) AS new_mail_to_organization_encrypted,
                  COALESCE(p.mail_to_address_encrypted, UDF_ENCRYPTBYKEY(p.mail_to_address)) AS new_mail_to_address_encrypted,
                  COALESCE(i.aca_irs_form_1099_type_id, -1) AS new_aca_irs_form_1099_type_id,
                  i.irs_form_1099_type AS new_irs_form_1099_type,
                  s.aca_source_system_id AS new_aca_source_system_id
              FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYEE_STAGING_ESIS AS p
              LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_IRS_FORM_1099_TYPE AS i ON i.irs_form_1099_type_code = p.irs_form_1099_type_code
              LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM AS s ON s.source_system = p.source_system
          ) AS SOURCE
          WHERE TGT.ACA_PAYEE_STAGING_ESIS_ID = SOURCE.ACA_PAYEE_STAGING_ESIS_ID;
      END;
