operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          UPDATE {{ ref('SRC-ASTRUS', 'ACA_CLAIM_STAGING_GB') }}
          SET 
              ACA_DATE_ID_CLAIM_DATE = COALESCE(TRY_TO_NUMBER(TO_CHAR(G.CLAIM_DATE, 'YYYYMMDD')), -1),
              ACA_DATE_ID_ORIGINAL_OPEN_DATE = COALESCE(TRY_TO_NUMBER(TO_CHAR(G.ORIGINAL_OPEN_DATE, 'YYYYMMDD')), -1),
              ACA_ACCOUNT_STRUCTURE_ID = COALESCE(AC.ACA_ACCOUNT_STRUCTURE_ID, -1),
              EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED = COALESCE(G.EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED, ENCRYPT(G.EMPLOYEE_IDENTIFICATION_NUMBER, 'encryption_key')),
              EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED = COALESCE(G.EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED, ENCRYPT(G.EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER, 'encryption_key')),
              DEATH_DATE_ENCRYPTED = COALESCE(G.DEATH_DATE_ENCRYPTED, ENCRYPT(TO_VARCHAR(G.DEATH_DATE), 'encryption_key')),
              
              -- NULL decrypted columns
              EMPLOYEE_IDENTIFICATION_NUMBER = NULL,
              EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER = NULL,
              DEATH_DATE = NULL,
              
              ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              ACA_UPDATE_USER = 'dbo.spaca_aca_claim_staging_gb_update'
          FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM_STAGING_GB') }} G
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_ACCOUNT_STRUCTURE') }} AC 
              ON G.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID = AC.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID
              AND AC.ACA_SOURCE_SYSTEM_ID = G.ACA_SOURCE_SYSTEM_ID;
      END;
    testsEnabled: true
    truncateBefore: false
