operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          USE DATABASE ALLIANT_ONE;
          UPDATE ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING AS s
          SET
              dw_client_id = source.new_dw_client_id,
              dw_policy_id = source.new_dw_policy_id,
              sf_account_owner_id = source.new_sf_account_owner_id
          FROM (
              SELECT
                  s_inner.Epic_UniqPolicy,
                  s_inner.Epic_Client_Lookup_Code,
                  s_inner.SFAcctID,
                  COALESCE(cc.dw_client_id, -1) AS new_dw_client_id,
                  COALESCE(pc.dw_policy_id, -1) AS new_dw_policy_id,
                  sa.OwnerId AS new_sf_account_owner_id
              FROM ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING AS s_inner
              LEFT JOIN ALLIANT_DW.DBO.DW_POLICY_CURRENT AS pc
                  ON TO_VARCHAR(s_inner.Epic_UniqPolicy ) = pc.source_system_policy_id
                  AND pc.source_system = 'EPIC'
              LEFT JOIN ALLIANT_DW.DBO.DW_CLIENT_CURRENT AS cc
                  ON s_inner.Epic_Client_Lookup_Code = cc.lookup_code
              LEFT JOIN ALLIANT_DW.REF.SALESFORCE_ACCOUNT AS sa
                  ON s_inner.SFAcctID = sa.Id
          ) AS source
          WHERE
              EQUAL_NULL(s.Epic_UniqPolicy, source.Epic_UniqPolicy)
              AND EQUAL_NULL(s.Epic_Client_Lookup_Code, source.Epic_Client_Lookup_Code)
              AND EQUAL_NULL(s.SFAcctID, source.SFAcctID);
      END;
