    cteString: ""
    enabledColumnTestIDs: []
    sourceMapping:
      - aliases:
          CT: 37a6fa90-9582-4856-b606-64d275dda709
          STG: 6c0bee31-7a3f-41a0-b8ed-7792f11b725f
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: SRC-ASTRUS
            nodeName: ACA_CLAIM_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_CLAIM_TRANSACTION_STAGING_ESIS
          - locationName: SRC-ASTRUS
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }} AS CT
            INNER JOIN (
                SELECT DISTINCT SOURCE_SYSTEM_CLAIM_ID
                FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION_STAGING_ESIS') }}
            ) AS T ON CT.SOURCE_SYSTEM_CLAIM_ID = T.SOURCE_SYSTEM_CLAIM_ID
            INNER JOIN (
                SELECT SOURCE_SYSTEM_CLAIM_ID, MAX(ACA_TRANSACTION_DATE) AS ACA_TRANSACTION_DATE
                FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }}
                WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS')
