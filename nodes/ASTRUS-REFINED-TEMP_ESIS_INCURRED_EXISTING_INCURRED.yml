        join:
          joinCondition: |-
            FROM (
              SELECT INC.SOURCE_SYSTEM_CLAIM_ID, INC.ACA_RESERVE_TYPE_ID, MAX(INC.COVERAGE_GROUP_CODE) AS COVERAGE_GROUP_CODE, MAX(INC.RESERVE_TYPE) AS RESERVE_TYPE, SUM(INC.EXPERIENCE_AMOUNT_BY_RESERVE_TYPE) AS INCURRED_AMOUNT, IFNULL(MAX(INC.TRANSACTION_SEQUENCE_NUMBER), 0) AS TRANSACTION_SEQUENCE_NUMBER
              FROM {{ ref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION') }} AS INC
              INNER JOIN (
                  SELECT SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, MIN(ACA_DATE_ID_TRANSACTION_DATE) AS ACA_DATE_ID_TRANSACTION_DATE
                  FROM {{ ref('ASTRUS-REFINED', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION') }}
                  GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID
              ) AS C ON C.SOURCE_SYSTEM_CLAIM_ID = INC.SOURCE_SYSTEM_CLAIM_ID AND C.ACA_RESERVE_TYPE_ID = INC.ACA_RESERVE_TYPE_ID AND C.ACA_DATE_ID_TRANSACTION_DATE > INC.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE
              WHERE INC.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS')
              GROUP BY INC.SOURCE_SYSTEM_CLAIM_ID, INC.ACA_RESERVE_TYPE_ID
            ) AS U
