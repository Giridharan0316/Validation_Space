name: ACA_POLICY
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          -- Step #3: Update Existing Records
          UPDATE {{ ref('ASTRUS-REFINED', 'ACA_POLICY') }} AS T
          SET 
              T.ACA_DATE_ID_EXPIRATION_DATE = TRY_CAST(TO_VARCHAR(S.EXPIRATION_DATE, 'YYYYMMDD') AS INT),
              T.EXPIRATION_DATE = S.EXPIRATION_DATE,
              T.ACA_SOURCE_SYSTEM_ID_WINNER = S.ACA_SOURCE_SYSTEM_ID_WINNER,
              T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              T.ACA_UPDATE_USER = 'dbo.spaca_aca_policy_insertUpdate'
          FROM {{ ref('SRC-ASTRUS', 'ACA_POLICY_STAGING') }} AS S
          WHERE S.SOURCE_SYSTEM_POLICY_ID = T.SOURCE_SYSTEM_POLICY_ID
          AND T.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
          AND IFNULL(T.EXPIRATION_DATE, CAST('1776-07-04' AS DATE)) <> IFNULL(S.EXPIRATION_DATE, CAST('1776-07-04' AS DATE));
      END;
