operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      UPDATE {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }}
      SET
          ACA_CLAIM_ID = IFF(T.ACA_CLAIM_ID = -1, COALESCE(C.ACA_CLAIM_ID, -1), T.ACA_CLAIM_ID),
          ACA_POLICY_ID = IFF(T.ACA_POLICY_ID = -1, COALESCE(P.ACA_POLICY_ID, -1), T.ACA_POLICY_ID),
          ACA_CLAIMANT_ID = IFF(T.ACA_CLAIMANT_ID = -1, COALESCE(CL.ACA_CLAIMANT_ID, -1), T.ACA_CLAIMANT_ID),
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'dbo.spaca_aca_claim_transaction_update'
      FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }} T
      LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} C 
          ON T.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID 
          AND T.ACA_SOURCE_SYSTEM_ID = C.ACA_SOURCE_SYSTEM_ID
      LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_POLICY') }} P 
          ON T.SOURCE_SYSTEM_POLICY_ID = P.SOURCE_SYSTEM_POLICY_ID
      LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CLAIMANT') }} CL 
          ON T.SOURCE_SYSTEM_CLAIMANT_ID = CL.SOURCE_SYSTEM_CLAIMANT_ID
      WHERE (
          (T.ACA_CLAIM_ID = -1 AND T.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL)
          OR (T.ACA_POLICY_ID = -1 AND T.SOURCE_SYSTEM_POLICY_ID IS NOT NULL)
          OR (T.ACA_CLAIMANT_ID = -1 AND T.SOURCE_SYSTEM_CLAIMANT_ID IS NOT NULL)
      );
      END;
    testsEnabled: true
    truncateBefore: false
