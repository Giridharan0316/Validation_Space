  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    USE DATABASE PLANNING_ALLIANT;\n    LET to_recipient VARCHAR\
      \ := '{{ parameters.TO_RECIPIENT }}';\n    LET copy_recipient VARCHAR := '{{\
      \ parameters.COPY_RECIPIENT }}';\n    LET environment VARCHAR := '{{ parameters.ENVIRONMENT\
      \ }}';\n    LET machine VARCHAR := '{{ parameters.MACHINE }}';\n    LET tableHTML\
      \ VARCHAR;\n    LET subject VARCHAR;\n    LET subject_text VARCHAR;\n    LET\
      \ row_count INT;\n\n    SELECT COUNT(1) INTO :row_count FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'SPPA_PLANNING_FCCS_BROKER_CLIENT_EMAIL_CHANGES') }};\n\n    IF (:row_count\
      \ > 0) THEN\n      subject_text := 'Planning Cloud Dimension Changes';\n   \
      \   SELECT \n          '<html><body><h1>Planning Cloud Dimension Changes</h1>'\
      \ ||\n          '<table border=\"1\" width=\"100%\">' ||\n          '<tr bgcolor=\"\
      silver\"><td>Change Type</td><td>Dimension Type</td><td>Original Planning ID</td><td>Original\
      \ Planning Alias</td><td>SourceSystem</td><td>Planning ID</td><td>Planning Alias</td><td>Parent\
      \ ID</td><td>Original Parent ID</td><td>Begin Post Date</td><td>End Post Date</td><td>dw_date_created</td></tr>'\
      \ ||\n          LISTAGG(\n              '<tr>' || \n              '<td>' ||\
      \ CHANGE_TYPE || '</td>' ||\n              '<td>' || DIMENSION_TYPE || '</td>'\
      \ ||\n              '<td>' || ORIGINAL_PLANNING_ID || '</td>' ||\n         \
      \     '<td>' || ORIGINAL_PLANNING_ALIAS || '</td>' ||\n              '<td>'\
      \ || SOURCE_SYSTEM || '</td>' ||\n              '<td>' || PLANNING_ID || '</td>'\
      \ ||\n              '<td>' || PLANNING_ALIAS || '</td>' ||\n              '<td>'\
      \ || PARENT_PLANNING_ID || '</td>' ||\n              '<td>' || ORIGINAL_PARENT_PLANNING_ID\
      \ || '</td>' ||\n              '<td>' || BEGIN_POST_DATE_STR || '</td>' ||\n\
      \              '<td>' || END_POST_DATE_STR || '</td>' ||\n              '<td>'\
      \ || DW_DATE_CREATED_FORMATTED || '</td>' ||\n              '</tr>'\n      \
      \    , '') || \n          '</table></body></html>'\n      INTO :tableHTML \n\
      \      FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'SPPA_PLANNING_FCCS_BROKER_CLIENT_EMAIL_CHANGES')\
      \ }};\n    ELSE\n      subject_text := 'No Planning Cloud Dimension Changes\
      \ To Report (EOM)';\n      tableHTML := '';\n    END IF;\n\n    subject := :environment\
      \ || ': ' || :machine || ': ' || :subject_text;\n\n    IF (:to_recipient IS\
      \ NOT NULL AND :to_recipient != '') THEN\n        LET recipients_list VARCHAR\
      \ := :to_recipient;\n        IF (:copy_recipient IS NOT NULL AND :copy_recipient\
      \ != '') THEN\n            recipients_list := recipients_list || ',' || :copy_recipient;\n\
      \        END IF;\n\n        -- NOTE: Snowflake's SYSTEM$SEND_EMAIL requires\
      \ a pre-configured Notification Integration.\n        CALL SYSTEM$SEND_EMAIL(\n\
      \            'default_integration', -- Placeholder for actual integration name\n\
      \            recipients_list,\n            :subject,\n            COALESCE(:tableHTML,\
      \ :subject_text),\n            'text/html'\n        );\n    END IF;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
