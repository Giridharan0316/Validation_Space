          - locationName: SRC-ASTRUS
            nodeName: ACA_SOURCE_SYSTEM
          - locationName: SRC-ASTRUS
            nodeName: ACA_TRANSACTION_THIRD_PARTY_RECOVERY
        join:
          joinCondition: |-
            FROM (
                SELECT ACA_TRANSACTION_THIRD_PARTY_RECOVERY_ID,
                       LTRIM(RTRIM(CLAIM_COVERAGE_CODE)) AS CLAIM_COVERAGE_CODE,
                       RECOVERY_AMOUNT1, RECOVERY_AMOUNT2, RECOVERY_AMOUNT3,
                       RECOVERY_AMOUNT4, RECOVERY_AMOUNT5, RECOVERY_AMOUNT6
                FROM {{ ref('SRC-ASTRUS', 'ACA_TRANSACTION_THIRD_PARTY_RECOVERY') }}
                WHERE ACA_DATE_UPDATED > (
                    SELECT COALESCE(MAX(ACA_DATE_UPDATED), CAST('1776-07-04 00:00:00.000' AS TIMESTAMP_NTZ))
                    FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION') }}
                    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')
                )
            ) AS P
            UNPIVOT (
                RECOVERY_AMOUNT_BY_RESERVE_TYPE
                FOR RESERVE_TYPE_COLUMN_NUMBER IN (RECOVERY_AMOUNT1, RECOVERY_AMOUNT2, RECOVERY_AMOUNT3, RECOVERY_AMOUNT4, RECOVERY_AMOUNT5, RECOVERY_AMOUNT6)
            ) AS U
            WHERE U.RECOVERY_AMOUNT_BY_RESERVE_TYPE <> 0
