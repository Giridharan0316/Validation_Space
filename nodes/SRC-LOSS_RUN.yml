    sourceMapping:
      - aliases:
          CS: 9a38541c-3233-4fce-b2a3-2c1f964a2752
          D: fe71765c-4235-46bb-866d-1bf9543e3d48
          RR: 07374cf4-e1c8-4608-b39a-eaf8eba57635
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: ASTRUS-REFINED
            nodeName: TEMP_CLAIM_STATUS
          - locationName: ASTRUS-REFINED
            nodeName: TEMP_RESERVE_REMAINING
          - locationName: ASTRUS-REFINED
            nodeName: TEMP_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ASTRUSMODELDIMENSION
          - locationName: SRC-ASTRUS
            nodeName: ASTRUSMODELINCURREDTRANSACTION
        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ASTRUSMODELDIMENSION') }} D

            LEFT JOIN {{ ref('ASTRUS-REFINED', 'TEMP_CLAIM_STATUS') }} CS
              ON CS.ACA_CLAIM_ID = D.ACA_CLAIM_ID
              AND CS.ROW_SEQ = 1

            LEFT JOIN (
              SELECT ACA_CLAIM_ID,
                     SUM(IFF(RESERVE_TYPE = 'B. I.', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS INCURRED_BI,
                     SUM(IFF(RESERVE_TYPE = 'COLLISION', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS INCURRED_COLLISION,
                     SUM(IFF(RESERVE_TYPE = 'COMP', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS INCURRED_COMP,
                     SUM(IFF(RESERVE_TYPE = 'EXPENSE', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS INCURRED_EXPENSE,
                     SUM(IFF(RESERVE_TYPE = 'INDEMNITY', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS INCURRED_INDEMNITY,
                     SUM(IFF(RESERVE_TYPE = 'MEDICAL', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS INCURRED_MEDICAL,
                     SUM(IFF(RESERVE_TYPE = 'P. D.', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS PD_MEDICAL,
                     SUM(IFF(RESERVE_TYPE = 'REHAB', EXPERIENCE_AMOUNT_BY_RESERVE_TYPE, 0)) AS REHAB_MEDICAL,
                     SUM(EXPERIENCE_AMOUNT_BY_RESERVE_TYPE) AS INCURRED_TOTAL
              FROM {{ ref('SRC-ASTRUS', 'ASTRUSMODELINCURREDTRANSACTION') }}
              WHERE RESERVE_TYPE <> 'RECOVERY'
              GROUP BY ACA_CLAIM_ID
            ) I
              ON I.ACA_CLAIM_ID = D.ACA_CLAIM_ID

            LEFT JOIN (
              SELECT ACA_CLAIM_ID,
                     MAX(TRANSACTION_DATE) AS TRANSACTION_DATE,
                     SUM(IFF(TRANSACTION_TYPE_CODE = 1, TRANSACTION_AMOUNT, 0)) AS PAYMENT_AMOUNT,
                     SUM(IFF(TRANSACTION_TYPE_CODE = 3, TRANSACTION_AMOUNT, 0)) AS RECOVERY_AMOUNT
              FROM {{ ref('ASTRUS-REFINED', 'TEMP_TRANSACTION') }}
              GROUP BY ACA_CLAIM_ID
            ) TD
              ON TD.ACA_CLAIM_ID = D.ACA_CLAIM_ID

            LEFT JOIN {{ ref('ASTRUS-REFINED', 'TEMP_RESERVE_REMAINING') }} RR
              ON RR.ACA_CLAIM_ID = D.ACA_CLAIM_ID
