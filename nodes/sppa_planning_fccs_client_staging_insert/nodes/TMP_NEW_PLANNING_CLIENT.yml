operation:
  name: TMP_NEW_PLANNING_CLIENT
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    USE DATABASE PLANNING_ALLIANT;\n    -- This single UPDATE statement replaces the original IF + WHILE loop for assigning parent planning IDs.\n    UPDATE PLANNING_ALLIANT.DBO.TMP_NEW_PLANNING_CLIENT AS TGT\n    SET\n        TGT.GROUP_ID = SRC.CALCULATED_GROUP_ID,\n        TGT.GROUP_NAME = SRC.CALCULATED_GROUP_ID || '_Client_Parent',\n        TGT.PARENT_PLANNING_ID = SRC.CALCULATED_GROUP_ID || '_Client_Parent'\n    FROM (\n        WITH CONFIG AS (\n            SELECT\n                300 AS BATCH_SIZE,\n                -- Get the max existing group ID and the count of members in that group.\n                (SELECT COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT)), 0) FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT) AS MAX_EXISTING_GROUP_ID\n        ),\n        LAST_GROUP_CONFIG AS (\n            SELECT\n                CFG.BATCH_SIZE,\n                CFG.MAX_EXISTING_GROUP_ID,\n                (SELECT COUNT(1)\
      \ FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT) = CFG.MAX_EXISTING_GROUP_ID) AS LAST_GROUP_MEMBER_COUNT\n            FROM CONFIG AS CFG\n        ),\n        -- Rank all unassigned rows to process them in a deterministic order.\n        UNASSIGNED_ROWS AS (\n            SELECT\n                ROW_ID,\n                ROW_NUMBER() OVER (ORDER BY ROW_ID) as RN\n            FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'TMP_NEW_PLANNING_CLIENT') }}\n            WHERE GROUP_ID IS NULL\n        )\n        -- Calculate the new group ID for each unassigned row.\n        SELECT\n            UR.ROW_ID,\n            LGC.MAX_EXISTING_GROUP_ID,\n            -- The logic handles two cases:\n            -- 1. Filling up the last existing group if it's not full.\n            -- 2. Creating new groups in batches for the remaining rows.\n            IFF(\n                LGC.MAX_EXISTING_GROUP_ID > 0 AND\
      \ UR.RN <= (LGC.BATCH_SIZE - LGC.LAST_GROUP_MEMBER_COUNT),\n                LGC.MAX_EXISTING_GROUP_ID,\n                (LGC.MAX_EXISTING_GROUP_ID + 1) + FLOOR((UR.RN - GREATEST(0, LGC.BATCH_SIZE - LGC.LAST_GROUP_MEMBER_COUNT) - 1) / LGC.BATCH_SIZE)\n            ) AS CALCULATED_GROUP_ID\n        FROM UNASSIGNED_ROWS AS UR\n        CROSS JOIN LAST_GROUP_CONFIG AS LGC\n    ) AS SRC\n    WHERE TGT.ROW_ID = SRC.ROW_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
