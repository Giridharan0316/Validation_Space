    cteString: ''
    enabledColumnTestIDs: []
    sourceMapping:
      - aliases:
          CT: CT
        customSQL:
          customSQL: ''
        dependencies:
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_CLAIM_TRANSACTION
        join:
          joinCondition: "FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM_TRANSACTION')\
            \ }} AS CT\nINNER JOIN (\n    SELECT DISTINCT SOURCE_SYSTEM_CLAIM_ID\n\
            \    FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_ESIS\n\
            ) AS T ON CT.SOURCE_SYSTEM_CLAIM_ID = T.SOURCE_SYSTEM_CLAIM_ID\nINNER\
            \ JOIN (\n    SELECT SOURCE_SYSTEM_CLAIM_ID, MAX(ACA_TRANSACTION_DATE)\
            \ AS ACA_TRANSACTION_DATE\n    FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO',\
            \ 'ACA_CLAIM_TRANSACTION') }}\n    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT\
