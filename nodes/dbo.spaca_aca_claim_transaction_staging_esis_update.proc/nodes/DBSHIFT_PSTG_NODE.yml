operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;\n\nUPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_ESIS s\nSET \n    s.aca_claim_id = source.new_aca_claim_id,\n    s.aca_claimant_id = source.new_aca_claimant_id,\n    s.aca_date_id_transaction_date = source.new_aca_date_id_transaction_date,\n    s.aca_date_id_status_date = source.new_aca_date_id_status_date,\n    s.aca_date_id_reported_date = source.new_aca_date_id_reported_date,\n    s.aca_date_id_accident_date = source.new_aca_date_id_accident_date,\n    s.aca_policy_id = source.new_aca_policy_id,\n    s.aca_claim_attribute_id = source.new_aca_claim_attribute_id,\n    s.aca_current_flag = source.new_aca_current_flag,\n    s.aca_transaction_date = source.s_source_system_transaction_date,\n    s.max_transaction_date_per_claim = source.max_transaction_date_per_claim,\n    s.next_transaction_date = source.next_transaction_date,\n    s.aca_accident_source_code_id = source.new_aca_accident_source_code_id,\n\
      \    s.description_of_loss_encrypted = source.new_description_of_loss_encrypted,\n    s.vehicle_identification_number_encrypted = source.new_vehicle_identification_number_encrypted,\n    s.claimant_encrypted = source.new_claimant_encrypted,\n    s.claimant_ssn_encrypted = source.new_claimant_ssn_encrypted,\n    s.description_of_loss = NULL,\n    s.vehicle_identification_number = NULL,\n    s.claimant = NULL,\n    s.claimant_ssn = NULL,\n    s.aca_source_system_id = source.new_aca_source_system_id,\n    s.aca_update_user = source.new_aca_update_user,\n    s.aca_date_updated = source.new_aca_date_updated\nFROM (\n    SELECT\n        s.source_system_claim_id,\n        s.source_system_transaction_date,\n        s.source_system_transaction_date as s_source_system_transaction_date,\n        IFNULL(cl.aca_claim_id, -1) AS new_aca_claim_id,\n        IFNULL(clm.aca_claimant_id, -1) AS new_aca_claimant_id,\n        IFNULL(TRY_CAST(TO_VARCHAR(s.source_system_transaction_date, 'YYYYMMDD') AS INT),\
      \ -1) AS new_aca_date_id_transaction_date,\n        IFNULL(TRY_CAST(TO_VARCHAR(s.status_date, 'YYYYMMDD') AS INT), -1) AS new_aca_date_id_status_date,\n        IFNULL(TRY_CAST(TO_VARCHAR(s.reported_date, 'YYYYMMDD') AS INT), -1) AS new_aca_date_id_reported_date,\n        IFNULL(TRY_CAST(TO_VARCHAR(s.accident_date, 'YYYYMMDD') AS INT), -1) AS new_aca_date_id_accident_date,\n        IFNULL(p.aca_policy_id, -1) AS new_aca_policy_id,\n        IFNULL(ca.aca_claim_attribute_id, -1) AS new_aca_claim_attribute_id,\n        IFF(s.source_system_transaction_date = mx.max_transaction_date_per_claim, 'Y', 'N') AS new_aca_current_flag,\n        mx.max_transaction_date_per_claim,\n        mx.next_transaction_date,\n        IFNULL(asco.aca_accident_source_code_id, -1) AS new_aca_accident_source_code_id,\n        IFNULL(s.description_of_loss_encrypted, NULL /* T-SQL ENCRYPTBYKEY not supported. Manual migration required. */) AS new_description_of_loss_encrypted,\n        IFNULL(s.vehicle_identification_number_encrypted,\
      \ NULL /* T-SQL ENCRYPTBYKEY not supported. Manual migration required. */) AS new_vehicle_identification_number_encrypted,\n        IFNULL(s.claimant_encrypted, NULL /* T-SQL ENCRYPTBYKEY not supported. Manual migration required. */) AS new_claimant_encrypted,\n        IFNULL(s.claimant_ssn_encrypted, NULL /* T-SQL ENCRYPTBYKEY not supported. Manual migration required. */) AS new_claimant_ssn_encrypted,\n        (SELECT aca_source_system_id FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE source_system = 'ESIS') AS new_aca_source_system_id,\n        'spaca_aca_claim_transaction_staging_esis_update' AS new_aca_update_user,\n        CURRENT_TIMESTAMP() AS new_aca_date_updated\n    FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_ESIS s\n    INNER JOIN (\n        SELECT \n            source_system_claim_id,\n            source_system_transaction_date,\n            DATEADD(DAY, -1, LEAD(source_system_transaction_date, 1) OVER (PARTITION BY source_system_claim_id\
      \ ORDER BY source_system_transaction_date ASC)) AS next_transaction_date,\n            MAX(source_system_transaction_date) OVER (PARTITION BY source_system_claim_id) AS max_transaction_date_per_claim\n        FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_ESIS\n    ) mx ON s.source_system_claim_id = mx.source_system_claim_id AND s.source_system_transaction_date = mx.source_system_transaction_date\n    LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM cl ON s.source_system_claim_id = cl.source_system_claim_id \n        AND cl.aca_source_system_id = (SELECT aca_source_system_id FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE source_system = 'ESIS')\n    LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT clm ON clm.source_system_claimant_id = s.source_system_claimant_id\n    LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY p ON p.source_system_policy_id = s.source_system_policy_id\n    LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_ATTRIBUTE ca\
      \ ON s.source_system_claim_attribute_id = ca.source_system_claim_attribute_id\n    LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_ACCIDENT_SOURCE_CODE asco ON asco.source_system_accident_source_code_id = s.source_system_accident_source_code_id\n) AS source\nWHERE s.source_system_claim_id = source.source_system_claim_id \n  AND s.source_system_transaction_date = source.source_system_transaction_date;\n\nEND;"
    testsEnabled: true
    truncateBefore: false
