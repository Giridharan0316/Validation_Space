    postSQL: |-
      BEGIN
          USE DATABASE DEV_RAW;

          -- FIRST SET STATUS TO NULL
          UPDATE {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_CLIENT') }} AS PC
          SET
              PC.CLIENT_STATUS_INDICATOR = NULL
          WHERE PC.CLIENT_STATUS_INDICATOR IS NOT NULL;

          -- SET CURRENT_FLAG TO 'N'
          UPDATE {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_CLIENT') }} AS PC
          SET
              CURRENT_FLAG = 'N',
              DW_DATE_UPDATED = CURRENT_TIMESTAMP,
              DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_CLIENT_INSERTUPDATE'
          WHERE IFNULL(PC.CURRENT_FLAG, 'Y') = 'Y'
            AND NOT EXISTS (
              SELECT 1
              FROM {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG
              WHERE STG.PLANNING_ID = PC.PLANNING_ID
            );
      END;
