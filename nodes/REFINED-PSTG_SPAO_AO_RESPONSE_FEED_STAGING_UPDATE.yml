operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      UPDATE {{ ref('SRC-CLAIMS', 'AO_RESPONSE_FEED_STAGING') }} s
      SET
          dw_client_id        = COALESCE(cc.dw_client_id, -1),
          dw_policy_id        = COALESCE(pc.dw_policy_id, -1),
          sf_account_owner_id = sa.OwnerId
      FROM {{ ref('SRC-CLAIMS', 'AO_RESPONSE_FEED_STAGING') }} s
      LEFT JOIN {{ ref('SRC-ALLIANT_DW', 'DW_POLICY_CURRENT') }} pc
          ON  TRY_CAST(s.Epic_UniqPolicy AS VARCHAR(50)) = pc.source_system_policy_id
          AND pc.source_system = 'EPIC'
      LEFT JOIN {{ ref('SRC-ALLIANT_DW', 'DW_CLIENT_CURRENT') }} cc
          ON  s.Epic_Client_Lookup_Code = cc.lookup_code
      LEFT JOIN {{ ref('SRC-CLAIMS', 'SALESFORCE_ACCOUNT') }} sa
          ON  s.SFAcctID = sa.Id;
