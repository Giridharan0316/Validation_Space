      - locationName: SRC-CLAIMS
        nodeName: SF_CLAIM_ID_STAGE
      join:
        joinCondition: "FROM {{ ref('SRC-CLAIMS', 'AO_CLAIM') }} AS A1\nLEFT JOIN {{ ref('SRC-CLAIMS', 'SF_ACCOUNT') }} AS SA ON A1.SF_ACCOUNT_ID = SA.SF_ACCOUNT_ID\nLEFT OUTER JOIN {{ ref('SRC-CLAIMS', 'SF_CLAIM_ID_STAGE') }} AS STG ON A1.SOURCE_SYSTEM_CLAIM_ID = STG.SOURCE_SYSTEM_CLAIM_ID\nGROUP BY \n    A1.AO_CLAIM_ID, A1.SF_ACCOUNT_ID, A1.SOURCE_SYSTEM_CLAIM_ID, SA.SF_ACCOUNT_NAME, A1.SF_ACCOUNT_OWNER_ID,\n    A1.CARRIER_NAME, A1.CLAIM_NUMBER, A1.CLIENT_NAME, A1.POLICY_NUMBER, A1.EPIC_POLICY_NUMBER,\n    A1.EPIC_CLIENT_LOOKUP_CODE, A1.POLICY_CUSTOMER_NAME, A1.POLICY_YEAR, A1.POLICY_EFFECTIVE_DATE,\n    A1.POLICY_EXPIRATION_DATE, A1.POLICY_COVERAGE_TYPE, A1.POLICY_COVERAGE_KIND, A1.CLAIMANT_NAME_FULL,\n    A1.CLAIMANT_AGE, A1.CLAIM_REPORTED_DATE, A1.CLAIM_STATUS, A1.CLAIM_CLOSED_DATE, A1.CLAIM_MAJOR_CLASS_CODE,\n    A1.LOSS_DATETIME, A1.LOSS_TYPE, A1.LOSS_STATE, A1.LOSS_ACCIDENT_DESCRIPTION, A1.VALUATION_DATE,\n    A1.INDEMNITY_INCURRED, A1.INDEMNITY_PAID, A1.INDEMNITY_RESERVE, A1.MEDICAL_INCURRED,\
          \ A1.MEDICAL_RESERVE,\n    A1.MEDICAL_PAID, A1.EXPENSE_INCURRED, A1.EXPENSE_RESERVE, A1.EXPENSE_PAID, A1.PROPERTY_INCURRED,\n    A1.PROPERTY_RESERVE, A1.PROPERTY_DAMAGE_PAID, A1.TOTAL_RECOVERIES, A1.TOTAL_INCURRED, A1.CURRENCY_TYPE,\n    A1.PAID_LEGAL, A1.BODILY_INJURY, A1.TOTAL_RESERVE, A1.TOTAL_PAID, A1.SOURCE_COMPANY,\n    SA.SF_ACCOUNT_ID, A1.LOAD_TO_SF_FLAG, STG.SOURCE_SYSTEM_SALESFORCE_CLAIM_SPECIALTY_ID"
