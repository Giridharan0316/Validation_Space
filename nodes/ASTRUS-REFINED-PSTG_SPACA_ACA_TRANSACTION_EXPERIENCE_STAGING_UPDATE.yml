operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          UPDATE {{ref('SRC-ASTRUS','ACA_TRANSACTION_EXPERIENCE_STAGING')}} AS TCS
          SET
              UNIQUE_CLAIM_ID = CONCAT(TCS.CLIENT_NUMBER, '-' , TCS.ACCIDENT_NUMBER, '-', TCS.CLAIM_COVERAGE_CODE,'-' , TCS.CLAIM_SEQUENCE_NUMBER),
              EXPERIENCE_AMOUNT1 = CASE WHEN TCS.EXPERIENCE_AMOUNT1 LIKE '%-%' THEN CAST(ABS(TCS.EXPERIENCE_AMOUNT1)/100 AS DECIMAL(16, 2)) * -1
                  ELSE CAST(ABS(TCS.EXPERIENCE_AMOUNT1)/100 AS DECIMAL(16, 2))
                  END,
              EXPERIENCE_AMOUNT2 = CASE WHEN TCS.EXPERIENCE_AMOUNT2 LIKE '%-%' THEN CAST(ABS(TCS.EXPERIENCE_AMOUNT2)/100 AS DECIMAL(16, 2)) * -1
                  ELSE CAST(ABS(TCS.EXPERIENCE_AMOUNT2)/100 AS DECIMAL(16, 2))
                  END,
              EXPERIENCE_AMOUNT3 = CASE WHEN TCS.EXPERIENCE_AMOUNT3 LIKE '%-%' THEN CAST(ABS(TCS.EXPERIENCE_AMOUNT3)/100 AS DECIMAL(16, 2)) * -1
                  ELSE CAST(ABS(TCS.EXPERIENCE_AMOUNT3)/100 AS DECIMAL(16, 2))
                  END,
              EXPERIENCE_AMOUNT4 = CASE WHEN TCS.EXPERIENCE_AMOUNT4 LIKE '%-%' THEN CAST(ABS(TCS.EXPERIENCE_AMOUNT4)/100 AS DECIMAL(16, 2)) * -1
                  ELSE CAST(ABS(TCS.EXPERIENCE_AMOUNT4)/100 AS DECIMAL(16, 2))
                  END,
              EXPERIENCE_AMOUNT5 = CASE WHEN TCS.EXPERIENCE_AMOUNT5 LIKE '%-%' THEN CAST(ABS(TCS.EXPERIENCE_AMOUNT5)/100 AS DECIMAL(16, 2)) * -1
                  ELSE CAST(ABS(TCS.EXPERIENCE_AMOUNT5)/100 AS DECIMAL(16, 2))
                  END,
              EXPERIENCE_AMOUNT6 = CASE WHEN TCS.EXPERIENCE_AMOUNT6 LIKE '%-%' THEN CAST(ABS(TCS.EXPERIENCE_AMOUNT6)/100 AS DECIMAL(16, 2)) * -1
                  ELSE CAST(ABS(TCS.EXPERIENCE_AMOUNT6)/100 AS DECIMAL(16, 2))
                  END,
              TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES = CASE WHEN TCS.TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES LIKE '%-%' THEN CAST(ABS(TCS.TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES)/100 AS DECIMAL(16, 2)) * -1 
                  ELSE CAST(ABS(TCS.TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES)/100 AS DECIMAL(16, 2))
                  END,
              EXPERIENCE_CHANGE_AMOUNT1 = CAST(ABS(TCS.EXPERIENCE_CHANGE_AMOUNT1)/100 AS DECIMAL(16, 2)),
              EXPERIENCE_CHANGE_AMOUNT2 = CAST(ABS(TCS.EXPERIENCE_CHANGE_AMOUNT2)/100 AS DECIMAL(16, 2)),
              EXPERIENCE_CHANGE_AMOUNT3 = CAST(ABS(TCS.EXPERIENCE_CHANGE_AMOUNT3)/100 AS DECIMAL(16, 2)),
              EXPERIENCE_CHANGE_AMOUNT4 = CAST(ABS(TCS.EXPERIENCE_CHANGE_AMOUNT4)/100 AS DECIMAL(16, 2)),
              EXPERIENCE_CHANGE_AMOUNT5 = CAST(ABS(TCS.EXPERIENCE_CHANGE_AMOUNT5)/100 AS DECIMAL(16, 2)),
              EXPERIENCE_CHANGE_AMOUNT6 = CAST(ABS(TCS.EXPERIENCE_CHANGE_AMOUNT6)/100 AS DECIMAL(16, 2)),
              TOTAL_EXPERIENCE_CHANGE_AMOUNT_ALL_RESERVE_TYPES = CAST(ABS(TCS.TOTAL_EXPERIENCE_CHANGE_AMOUNT_ALL_RESERVE_TYPES)/100 AS DECIMAL(16, 2)),
              EXPERIENCE_TRANSACTION_DATE = DATE_FROM_PARTS(TCS.TRANSACTION_YEAR,TCS.TRANSACTION_MONTH,TCS.TRANSACTION_DAY),
              POLICY_EFFECTIVE_DATE = CASE WHEN TCS.POLICY_EFFECTIVE_YEAR = '0000' THEN NULL
                                           ELSE DATE_FROM_PARTS(TCS.POLICY_EFFECTIVE_YEAR,TCS.POLICY_EFFECTIVE_MONTH,TCS.POLICY_EFFECTIVE_DAY)
                                           END,
              POLICY_EXPIRATION_DATE = CASE WHEN TCS.POLICY_EXPIRATION_YEAR = '0000' THEN NULL
                                            ELSE DATE_FROM_PARTS(TCS.POLICY_EXPIRATION_YEAR,TCS.POLICY_EXPIRATION_MONTH,TCS.POLICY_EXPIRATION_DAY)
                                            END,
              ACA_DATE_UPDATED  = CURRENT_TIMESTAMP(),
              ACA_UPDATE_USER = 'SPACA_ACA_TRANSACTION_EXPERIENCE_STAGING_UPDATE';
      END
    testsEnabled: true
    truncateBefore: false
