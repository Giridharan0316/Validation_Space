  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    USE DATABASE ALLIANT_ONE;\n    UPDATE ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING\
      \ AS s\n    SET\n        dw_client_id = source.new_dw_client_id,\n        dw_policy_id\
      \ = source.new_dw_policy_id,\n        sf_account_owner_id = source.new_sf_account_owner_id\n\
      \    FROM (\n        SELECT\n            s_inner.Epic_UniqPolicy,\n        \
      \    s_inner.Epic_Client_Lookup_Code,\n            s_inner.SFAcctID,\n     \
      \       COALESCE(cc.dw_client_id, -1) AS new_dw_client_id,\n            COALESCE(pc.dw_policy_id,\
      \ -1) AS new_dw_policy_id,\n            sa.OwnerId AS new_sf_account_owner_id\n\
      \        FROM ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING AS s_inner\n        LEFT\
      \ JOIN ALLIANT_DW.DBO.DW_POLICY_CURRENT AS pc\n            ON TO_VARCHAR(s_inner.Epic_UniqPolicy\
      \ ) = pc.source_system_policy_id\n            AND pc.source_system\
      \ = 'EPIC'\n        LEFT JOIN ALLIANT_DW.DBO.DW_CLIENT_CURRENT AS cc\n     \
      \       ON s_inner.Epic_Client_Lookup_Code = cc.lookup_code\n        LEFT JOIN\
      \ ALLIANT_DW.REF.SALESFORCE_ACCOUNT AS sa\n            ON s_inner.SFAcctID =\
      \ sa.Id\n    ) AS source\n    WHERE\n        EQUAL_NULL(s.Epic_UniqPolicy, source.Epic_UniqPolicy)\n\
      \        AND EQUAL_NULL(s.Epic_Client_Lookup_Code, source.Epic_Client_Lookup_Code)\n\
      \        AND EQUAL_NULL(s.SFAcctID, source.SFAcctID);\nEND;"
