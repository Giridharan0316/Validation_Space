  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n  USE DATABASE ALLIANT_CLAIMS_ASTRUS;\n  UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION\
      \ AS P\n  SET\n      P.ACA_CLAIM_ID = C.ACA_CLAIM_ID,\n      P.ACA_DATE_UPDATED\
      \ = CURRENT_TIMESTAMP(),\n      P.ACA_UPDATE_USER = 'spaca_aca_recovery_transaction_update'\n\
      \  FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C\n  WHERE C.SOURCE_SYSTEM_CLAIM_ID\
      \ = P.SOURCE_SYSTEM_CLAIM_ID\n    AND P.ACA_CLAIM_ID = -1\n    AND P.SOURCE_SYSTEM_CLAIM_ID\
      \ IS NOT NULL;\nEND;"
    testsEnabled: true
    truncateBefore: false
