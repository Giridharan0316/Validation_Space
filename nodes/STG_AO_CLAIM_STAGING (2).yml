name: STG_AO_CLAIM_STAGING
operation:
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\nUSE DATABASE ALLIANT_ONE;\nUPDATE ALLIANT_ONE.STG.AO_CLAIM_STAGING\nSET\n    RECORDHASHBYTE = SHA1(\n        CONCAT_WS('|',\n            IFNULL(CAST(CARRIERNAME AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMNUMBER AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMNUMBERSUFFIX AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMREPORTEDDATE AS VARCHAR), '-x'),\n            IFNULL(CAST(CLIENTNAME AS VARCHAR), '-x'),\n            IFNULL(CAST(POLICYNUMBER AS VARCHAR), '-x'),\n            IFNULL(CAST(EPICLOOKUPCODE AS VARCHAR), '-x'),\n            IFNULL(CAST(EPICPOLICYNUMBER AS VARCHAR), '-x'),\n            IFNULL(CAST(POLICYCUSTOMERNAME AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(POLICYYEAR AS VARCHAR), '-x'),\n            IFNULL(CAST(POLICYEFFECTIVEDATE AS VARCHAR), '-x'),\n            IFNULL(CAST(POLICYEXPIRATIONDATE AS VARCHAR), '-x'),\n            IFNULL(CAST(POLICYCOVERAGETYPE AS VARCHAR), '-x'),\n            IFNULL(CAST(POLICYCOVERAGEKIND AS VARCHAR), '-x'),\n\
      \            IFNULL(CAST(CLAIMANTNAMEFULL AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMSTATUS AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMANTAGE AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMCLOSEDDATE AS VARCHAR), '-x'),\n            IFNULL(CAST(CLAIMMAJORCLASSCODE AS VARCHAR), '-x'),\n            IFNULL(CAST(LOSSDATETIME AS VARCHAR), '-x'),\n            IFNULL(CAST(LOSSTYPE AS VARCHAR), '-x'),\n            IFNULL(CAST(LOSSSTATE AS VARCHAR), '-x'),\n            IFNULL(CAST(LOSSACCIDENTDESCRIPTION AS VARCHAR), '-x'),\n            IFNULL(CAST(VALUATIONDATE AS VARCHAR), '-x'),\n            IFNULL(CAST(CURRENCYTYPE AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(INDEMNITYINCURRED AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(PAIDINDEMNITYPAID AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(RESERVEINDEMNITY AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(MEDICALINCURRED AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(RESERVEMEDICAL AS VARCHAR), '-x'),\n          \
      \  IFNULL(TRY_CAST(MEDICALPAID AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(EXPENSESINCURRED AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(RESERVESEXPENSE AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(EXPENSEPAID AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(PROPERTYINCURRED AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(PROPERTYRESERVE AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(PROPERTYDAMAGEPAID AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(TOTALRECOVERIES AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(PAIDLEGAL AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(PAIDBODILYINJURY AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(RESERVETOTAL AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(TOTALPAID AS VARCHAR), '-x'),\n            IFNULL(TRY_CAST(TOTALINCURRED AS VARCHAR), '-x'),\n            IFNULL(CAST(SOURCE_COMPANY AS VARCHAR), '-x')\n        )\n    ),\n    HASHSUM = \n        COALESCE(INDEMNITYINCURRED, 0) +\n        COALESCE(PAIDINDEMNITYPAID, 0) +\n\
      \        COALESCE(RESERVEINDEMNITY, 0) +\n        COALESCE(MEDICALINCURRED, 0) +\n        COALESCE(MEDICALPAID, 0) +\n        COALESCE(RESERVEMEDICAL, 0) +\n        COALESCE(EXPENSESINCURRED, 0) +\n        COALESCE(EXPENSEPAID, 0) +\n        COALESCE(RESERVESEXPENSE, 0) +\n        COALESCE(PROPERTYINCURRED, 0) +\n        COALESCE(PROPERTYDAMAGEPAID, 0) +\n        COALESCE(PROPERTYRESERVE, 0) +\n        COALESCE(PAIDLEGAL, 0) +\n        COALESCE(PAIDBODILYINJURY, 0) +\n        COALESCE(RESERVETOTAL, 0) +\n        COALESCE(TOTALPAID, 0) +\n        COALESCE(TOTALINCURRED, 0) +\n        COALESCE(TOTALRECOVERIES, 0);\nUPDATE ALLIANT_ONE.STG.AO_CLAIM_STAGING AS S\nSET\n    S.SF_ACCOUNT_ID = SOURCE_DATA.SF_ACCOUNT_ID,\n    S.ROWRANK = SOURCE_DATA.ROWRANK,\n    S.SF_ACCOUNT_OWNER_ID = SOURCE_DATA.SF_ACCOUNT_OWNER_ID\nFROM (\n    SELECT\n        S_BASE.GUID,\n        R.SF_ACCOUNT_ID,\n        T.ROWRANK,\n        R.SF_ACCOUNT_OWNER_ID\n    FROM ALLIANT_ONE.STG.AO_CLAIM_STAGING AS S_BASE\n  \
      \  LEFT JOIN (\n        SELECT DISTINCT EPIC_CLIENT_LOOKUP_CODE, SF_ACCOUNT_ID, SF_ACCOUNT_OWNER_ID\n        FROM {{ ref('DBSHIFT', 'AO_RESPONSE_FEED') }}\n        WHERE SF_ACCOUNT_ID IS NOT NULL\n    ) AS R ON S_BASE.EPICLOOKUPCODE = R.EPIC_CLIENT_LOOKUP_CODE\n    LEFT JOIN {{ ref('DBSHIFT', 'V_TMPROWRANK') }} AS T\n        ON S_BASE.GUID = T.GUID\n        AND S_BASE.RECORDHASHBYTE = T.RECORDHASHBYTE\n        AND S_BASE.CLAIMNUMBER = T.CLAIMNUMBER\n        AND IFNULL(S_BASE.CLAIMNUMBERSUFFIX, 'xx') = IFNULL(T.CLAIMNUMBERSUFFIX, 'xx')\n) AS SOURCE_DATA\nWHERE S.GUID = SOURCE_DATA.GUID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
