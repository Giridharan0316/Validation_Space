        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ACA_PAYEE_GB') }} AS GB
            INNER JOIN {{ ref('SRC-ASTRUS', 'ACA_PAYEE_ESIS') }} AS ESIS
              ON ESIS.SOURCE_SYSTEM_PAYEE_ID = GB.SOURCE_SYSTEM_PAYEE_ID
            CROSS JOIN (
              SELECT COALESCE(MAX(ACA_DATE_UPDATED), CAST('1776-07-04 00:00:00.000' AS TIMESTAMP_NTZ)) AS LAST_LOAD_DATE 
              FROM {{ ref('SRC-ASTRUS', 'ACA_PAYEE') }} 
              WHERE ACA_PAYEE_ID <> -1
            ) AS LLD
            WHERE GB.ACA_PAYEE_GB_ID <> -1
              AND ESIS.ACA_PAYEE_ESIS_ID <> -1
              AND GB.ACA_DATE_UPDATED > LLD.LAST_LOAD_DATE
              AND ESIS.ACA_DATE_UPDATED > LLD.LAST_LOAD_DATE
              AND GB.ACA_DATE_UPDATED > ESIS.ACA_DATE_UPDATED
