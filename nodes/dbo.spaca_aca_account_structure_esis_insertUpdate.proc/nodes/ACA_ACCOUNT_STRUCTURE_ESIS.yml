operation:
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS;\nUPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE_ESIS AS a\nSET \n    source_system_account_structure_id = stg.source_system_account_structure_id,\n    division_id = stg.division_id,\n    division_name = stg.division_name,\n    subsidiary_id = stg.subsidiary_id,\n    subsidiary_name = stg.subsidiary_name,\n    location_id = stg.location_id,\n    location_name = stg.location_name,\n    aca_date_updated = CURRENT_TIMESTAMP(),\n    aca_update_user = 'dbo.spaca_aca_account_structure_esis_insertUpdate'\nFROM {{ ref('SRC-ASTRUS', 'ACA_ACCOUNT_STRUCTURE_STAGING_ESIS') }} AS stg\nWHERE a.source_system_account_structure_id = stg.source_system_account_structure_id\nAND a.aca_date_created <> CURRENT_TIMESTAMP()\nAND (\n    COALESCE(stg.division_id, '-1') <> COALESCE(a.division_id, '-1')\n    OR COALESCE(stg.division_name, '-1') <> COALESCE(a.division_name, '-1')\n    OR COALESCE(stg.subsidiary_id, '-1') <> COALESCE(a.subsidiary_id, '-1')\n\
      \    OR COALESCE(stg.subsidiary_name, '-1') <> COALESCE(a.subsidiary_name, '-1')\n    OR COALESCE(stg.location_id, '-1') <> COALESCE(a.location_id, '-1')\n    OR COALESCE(stg.location_name, '-1') <> COALESCE(a.location_name, '-1')\n);\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: false
