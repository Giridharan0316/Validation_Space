        dependencies:
          - locationName: SRC-ASTRUS
            nodeName: ACA_TRANSACTION_EXPERIENCE
          - locationName: ASTRUS-REFINED
            nodeName: TEMP_EXPERIENCE_EXISTING
          - locationName: SRC-ASTRUS
            nodeName: ACA_EXPERIENCE_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |-
            FROM (
                SELECT ACA_TRANSACTION_EXPERIENCE_ID, UNIQUE_CLAIM_ID, CLAIM_COVERAGE_CODE, EXPERIENCE_TRANSACTION_DATE, TRY_CAST(TRANSACTION_SEQUENCE_NUMBER AS INT) AS TRANSACTION_SEQUENCE_NUMBER, EXPERIENCE_AMOUNT1, EXPERIENCE_AMOUNT2, EXPERIENCE_AMOUNT3, EXPERIENCE_AMOUNT4, EXPERIENCE_AMOUNT5, EXPERIENCE_AMOUNT6, EXPERIENCE_CHANGE_AMOUNT1, EXPERIENCE_CHANGE_AMOUNT2, EXPERIENCE_CHANGE_AMOUNT3, EXPERIENCE_CHANGE_AMOUNT4, EXPERIENCE_CHANGE_AMOUNT5, EXPERIENCE_CHANGE_AMOUNT6, FALSE AS IS_EXISTING
                FROM {{ ref('SRC-ASTRUS', 'ACA_TRANSACTION_EXPERIENCE') }}
                WHERE ACA_DATE_UPDATED > IFF({{ parameters.iReprocessStartTransactionDate }} IS NULL, (SELECT COALESCE(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM {{ ref('SRC-ASTRUS', 'ACA_EXPERIENCE_TRANSACTION') }} WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')), '1900-01-01'::DATE)
                AND EXPERIENCE_TRANSACTION_DATE >= COALESCE({{ parameters.iReprocessStartTransactionDate }}, '1900-01-01'::DATE)
                UNION ALL
                SELECT ACA_TRANSACTION_EXPERIENCE_ID, UNIQUE_CLAIM_ID, CLAIM_COVERAGE_CODE, EXPERIENCE_TRANSACTION_DATE, TRANSACTION_SEQUENCE_NUMBER, EXPERIENCE_AMOUNT1, EXPERIENCE_AMOUNT2, EXPERIENCE_AMOUNT3, EXPERIENCE_AMOUNT4, EXPERIENCE_AMOUNT5, EXPERIENCE_AMOUNT6, EXPERIENCE_CHANGE_AMOUNT1, EXPERIENCE_CHANGE_AMOUNT2, EXPERIENCE_CHANGE_AMOUNT3, EXPERIENCE_CHANGE_AMOUNT4, EXPERIENCE_CHANGE_AMOUNT5, EXPERIENCE_CHANGE_AMOUNT6, IS_EXISTING
                FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'TEMP_EXPERIENCE_EXISTING') }}
            ) AS U
        name: TEMP_EXPERIENCE_MEASURE
