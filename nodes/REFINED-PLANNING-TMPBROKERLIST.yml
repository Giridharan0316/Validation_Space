name: TMPBROKERLIST
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE DEV_RAW;

          -- First update: fill remaining slots in the last group
          UPDATE {{ ref('REFINED-PLANNING', 'TMPBROKERLIST') }} AS TGT
          SET
              NEW_PARENT_GROUP_ID = SRC.MAX_GROUP_ID,
              NEW_PARENT_PLANNING_ID = SRC.MAX_GROUP_ID || '_Producer_Parent',
              NEW_PARENT_BROKER_COUNT = SRC.COUNT_OF_MAX_GROUP_ID + SRC.RN
          FROM (
              WITH BROKER_MAX AS (
                  SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS NUMBER(10,0))) AS MAX_GROUP_ID
                  FROM {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_BROKER') }}
              ),
              BROKER_COUNT AS (
                  SELECT COUNT(1) AS COUNT_OF_MAX_GROUP_ID
                  FROM {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_BROKER') }} B
                  CROSS JOIN BROKER_MAX
                  WHERE TRY_CAST(SUBSTRING(B.PARENT_PLANNING_ID, 1, POSITION('_' IN B.PARENT_PLANNING_ID) - 1) AS NUMBER(10,0)) = BROKER_MAX.MAX_GROUP_ID
              ),
              TMPBROKER_MAX AS (
                  SELECT MAX(EXISTING_GROUP_ID) AS MAX_EXISTING_GROUP_ID
                  FROM {{ ref('REFINED-PLANNING', 'TMPBROKERLIST') }}
              )
              SELECT
                  T.ROW_ID,
                  BM.MAX_GROUP_ID,
                  BC.COUNT_OF_MAX_GROUP_ID,
                  ROW_NUMBER() OVER (ORDER BY T.ROW_ID) AS RN
              FROM {{ ref('REFINED-PLANNING', 'TMPBROKERLIST') }} T
              CROSS JOIN BROKER_MAX BM
              CROSS JOIN BROKER_COUNT BC
              CROSS JOIN TMPBROKER_MAX TM
              WHERE T.NEW_PARENT_GROUP_ID IS NULL
                AND BM.MAX_GROUP_ID IS NOT NULL
                AND TM.MAX_EXISTING_GROUP_ID <> BM.MAX_GROUP_ID
          ) SRC
          WHERE TGT.ROW_ID = SRC.ROW_ID
            AND SRC.RN <= (300 - SRC.COUNT_OF_MAX_GROUP_ID);

          -- Second update: assign new groups
          UPDATE {{ ref('REFINED-PLANNING', 'TMPBROKERLIST') }} AS TGT
          SET
              NEW_PARENT_GROUP_ID = SRC.ASSIGNED_GROUP_ID,
              NEW_PARENT_PLANNING_ID = SRC.ASSIGNED_GROUP_ID || '_Producer_Parent',
              NEW_PARENT_BROKER_COUNT = SRC.RN_IN_GROUP,
              NEW_PARENT_FLAG = 'Y'
          FROM (
              SELECT
                  R.ROW_ID,
                  COALESCE(CFG.STARTING_GROUP_ID, 0) + CEIL(R.RN / 300.0) AS ASSIGNED_GROUP_ID,
                  ((R.RN - 1) % 300) + 1 AS RN_IN_GROUP
              FROM (
                  SELECT
                      ROW_ID,
                      ROW_NUMBER() OVER (ORDER BY ROW_ID) AS RN
                  FROM {{ ref('REFINED-PLANNING', 'TMPBROKERLIST') }}
                  WHERE NEW_PARENT_GROUP_ID IS NULL
              ) AS R
              CROSS JOIN (
                  SELECT
                      COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS NUMBER(10,0))), 0) AS STARTING_GROUP_ID
                  FROM {{ ref('SRC-ADF_TMP', 'PLANNING_FCCS_BROKER') }}
              ) AS CFG
          ) AS SRC
          WHERE TGT.ROW_ID = SRC.ROW_ID;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
