name: ACA_PAYMENT_TRANSACTION_STAGING_ESIS
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      UPDATE {{ ref('ASTRUS-REFINED', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }} P
      SET 
          CLIENT_NUMBER_BANK_ENCRYPTED = SOURCE.NEW_CLIENT_NUMBER_BANK_ENCRYPTED,
          BANK_NUMBER_ENCRYPTED = SOURCE.NEW_BANK_NUMBER_ENCRYPTED,
          ACCOUNT_NUMBER_ENCRYPTED = SOURCE.NEW_ACCOUNT_NUMBER_ENCRYPTED,
          PAYMENT_MESSAGE_ENCRYPTED = SOURCE.NEW_PAYMENT_MESSAGE_ENCRYPTED,
          CLIENT_NUMBER_BANK = NULL,
          BANK_NUMBER = NULL,
          ACCOUNT_NUMBER = NULL,
          PAYMENT_MESSAGE = NULL,
          SOURCE_SYSTEM_POLICY_ID = SOURCE.NEW_SOURCE_SYSTEM_POLICY_ID,
          ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
          ACA_RESERVE_TYPE_ID = SOURCE.NEW_ACA_RESERVE_TYPE_ID,
          ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,
          ACA_PAYMENT_ATTRIBUTE_ID = SOURCE.NEW_ACA_PAYMENT_ATTRIBUTE_ID,
          ACA_PAYEE_ID = SOURCE.NEW_ACA_PAYEE_ID,
          COVERAGE_GROUP_CODE = SOURCE.NEW_COVERAGE_GROUP_CODE,
          RESERVE_TYPE = SOURCE.NEW_RESERVE_TYPE,
          ACA_SOURCE_SYSTEM_ID = SOURCE.SOURCESYSTEMIDESIS,
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'dbo.spaca_aca_payment_transaction_staging_esis_update'
      FROM (
          SELECT
              P_INNER.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY_SOURCE_SYSTEM_CLAIM_ID,
              IFF(P_INNER.CLIENT_NUMBER_BANK_ENCRYPTED IS NULL, 
                  ENCRYPT(TO_VARIANT(P_INNER.CLIENT_NUMBER_BANK), 'dummy_passphrase_placeholder'), 
                  P_INNER.CLIENT_NUMBER_BANK_ENCRYPTED) AS NEW_CLIENT_NUMBER_BANK_ENCRYPTED,
              IFF(P_INNER.BANK_NUMBER_ENCRYPTED IS NULL, 
                  ENCRYPT(TO_VARIANT(P_INNER.BANK_NUMBER), 'dummy_passphrase_placeholder'), 
                  P_INNER.BANK_NUMBER_ENCRYPTED) AS NEW_BANK_NUMBER_ENCRYPTED,
              IFF(P_INNER.ACCOUNT_NUMBER_ENCRYPTED IS NULL, 
                  ENCRYPT(TO_VARIANT(P_INNER.ACCOUNT_NUMBER), 'dummy_passphrase_placeholder'), 
                  P_INNER.ACCOUNT_NUMBER_ENCRYPTED) AS NEW_ACCOUNT_NUMBER_ENCRYPTED,
              IFF(P_INNER.PAYMENT_MESSAGE_ENCRYPTED IS NULL, 
                  ENCRYPT(TO_VARIANT(P_INNER.PAYMENT_MESSAGE), 'dummy_passphrase_placeholder'), 
                  P_INNER.PAYMENT_MESSAGE_ENCRYPTED) AS NEW_PAYMENT_MESSAGE_ENCRYPTED,
              COALESCE(P_INNER.SOURCE_SYSTEM_POLICY_ID, MC.SOURCE_SYSTEM_POLICY_ID) AS NEW_SOURCE_SYSTEM_POLICY_ID,
              COALESCE(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
              COALESCE(RT.ACA_RESERVE_TYPE_ID, -1) AS NEW_ACA_RESERVE_TYPE_ID,
              COALESCE(P_INNER.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,
              COALESCE(PA.ACA_PAYMENT_ATTRIBUTE_ID, -1) AS NEW_ACA_PAYMENT_ATTRIBUTE_ID,
              COALESCE(PE.ACA_PAYEE_ID, -1) AS NEW_ACA_PAYEE_ID,
              COALESCE(P_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE) AS NEW_COVERAGE_GROUP_CODE,
              RT.TRANSACTION_GROUP AS NEW_RESERVE_TYPE,
              (SELECT ACA_SOURCE_SYSTEM_ID 
               FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} 
               WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) 
                                      FROM {{ ref('ASTRUS-REFINED', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }})) AS SOURCESYSTEMIDESIS
          FROM {{ ref('ASTRUS-REFINED', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }} P_INNER
          LEFT JOIN {{ ref('ASTRUS-CURATED', 'ACA_CLAIM') }} C 
              ON C.SOURCE_SYSTEM_CLAIM_ID = P_INNER.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN {{ ref('ASTRUS-CURATED', 'ACA_POLICY') }} PO 
              ON PO.SOURCE_SYSTEM_POLICY_ID = P_INNER.SOURCE_SYSTEM_POLICY_ID
          LEFT JOIN {{ ref('ASTRUS-CURATED', 'ACA_PAYMENT_ATTRIBUTE') }} PA 
              ON PA.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID = P_INNER.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID
          LEFT JOIN {{ ref('ASTRUS-CURATED', 'ACA_PAYEE') }} PE 
              ON PE.SOURCE_SYSTEM_PAYEE_ID = P_INNER.SOURCE_SYSTEM_PAYEE_ID
          LEFT JOIN {{ ref('ASTRUS-PRESENTATION', 'TEMP_ESIS_MISSING_CLAIM_POLICY') }} MC 
              ON MC.SOURCE_SYSTEM_CLAIM_ID = P_INNER.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_RESERVE_TYPE_MAPPING') }} RT
              ON RT.PAYMENT_TYPE_CODE = P_INNER.PAYMENT_TYPE_CODE
              AND RT.COVERAGE_GROUP_CODE = COALESCE(P_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
              AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID 
                                             FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} 
                                             WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) 
                                                                    FROM {{ ref('ASTRUS-REFINED', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') })))
      ) SOURCE
      WHERE P.SOURCE_SYSTEM_CLAIM_ID = SOURCE.JOIN_KEY_SOURCE_SYSTEM_CLAIM_ID
    testsEnabled: true
    truncateBefore: false
