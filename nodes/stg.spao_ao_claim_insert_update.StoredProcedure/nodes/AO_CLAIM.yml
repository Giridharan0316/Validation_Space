name: AO_CLAIM
type: Node
operation:
  name: AO_CLAIM
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    -- Update ao_claim load_to_sf_flag = 'I' if not in stg.sf_claim_id_stage\n    UPDATE ALLIANT_ONE.DBO.AO_CLAIM\n    SET LOAD_TO_SF_FLAG = 'I'\n    WHERE SOURCE_SYSTEM_CLAIM_ID NOT IN (SELECT SOURCE_SYSTEM_CLAIM_ID FROM {{ ref_no_link('ALLIANT_ONE_STG', 'SF_CLAIM_ID_STAGE') }} WHERE SOURCE_SYSTEM_CLAIM_ID IS NOT NULL)\n    AND LOAD_TO_SF_FLAG = 'N';\n\n    -- Update old rows to the most current SF Account Id\n    UPDATE ALLIANT_ONE.DBO.AO_CLAIM AS C\n    SET\n        C.SF_ACCOUNT_ID = TMP.SF_ACCOUNT_ID,\n        C.LOAD_TO_SF_FLAG = 'U'\n    FROM {{ ref_no_link('ALLIANT_ONE_STG', 'TMP_AO_RESPONSE_FEED') }} AS TMP\n    WHERE C.EPIC_CLIENT_LOOKUP_CODE = TMP.EPIC_CLIENT_LOOKUP_CODE\n    AND TMP.RNUM = 1\n    AND TMP.SF_ACCOUNT_ID <> C.SF_ACCOUNT_ID\n    AND C.LOAD_TO_SF_FLAG <> 'I';\nEND;"
    preSQL: "BEGIN\n    UPDATE ALLIANT_ONE.DBO.AO_CLAIM\n    SET LOAD_TO_SF_FLAG = 'N'\n    WHERE LOAD_TO_SF_FLAG IN ('I', 'U');\nEND;"
    testsEnabled: true
    truncateBefore: false
  database: DEV_CURATED
  deployEnabled: true
