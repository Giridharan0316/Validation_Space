operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      UPDATE {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS')}} AS p
      SET 
          aca_payment_type_code_id    = src.aca_payment_type_code_esis_id,
          aca_pay_to_code_id          = src.aca_pay_to_code_id,
          aca_mail_to_code_id         = src.aca_mail_to_code_id,
          aca_check_stock_type_id     = src.aca_check_stock_type_id,
          payment_type                = src.payment_type,
          pay_to                      = src.pay_to,
          mail_to                     = src.mail_to,
          check_stock_type            = src.check_stock_type,
          aca_source_system_id        = src.aca_source_system_id,
          aca_date_updated            = CURRENT_TIMESTAMP(),
          aca_update_user             = 'dbo.spaca_aca_payment_attribute_staging_esis_update'
      FROM (
          SELECT
              p2.aca_payment_attribute_staging_esis_id,
              ty.aca_payment_type_code_esis_id,
              ty.payment_type,
              pt.aca_pay_to_code_id,
              pt.pay_to,
              mt.aca_mail_to_code_id,
              mt.mail_to,
              cs.aca_check_stock_type_id,
              cs.check_stock_type,
              s.aca_source_system_id
          FROM {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS')}} AS p2
          LEFT JOIN (
              SELECT payment_type_code, MAX(aca_payment_type_code_esis_id) AS aca_payment_type_code_esis_id
              FROM {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_TYPE_CODE_ESIS') }}
              GROUP BY payment_type_code
          ) AS tym ON tym.payment_type_code = p2.payment_type_code
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_PAYMENT_TYPE_CODE_ESIS') }} AS ty
              ON ty.aca_payment_type_code_esis_id = tym.aca_payment_type_code_esis_id
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_PAY_TO_CODE') }} AS pt
              ON pt.pay_to_code = p2.pay_to_code
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_MAIL_TO_CODE') }} AS mt
              ON mt.mail_to_code = p2.mail_to_code
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_CHECK_STOCK_TYPE') }} AS cs
              ON cs.check_stock_type_code = p2.check_stock_type_code
          LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} AS s
              ON s.source_system = p2.source_system
      ) AS src
      WHERE p.aca_payment_attribute_staging_esis_id = src.aca_payment_attribute_staging_esis_id;
      END
    testsEnabled: true
    truncateBefore: false
