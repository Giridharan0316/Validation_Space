name: ACA_PAYMENT_TRANSACTION_STAGING_ESIS
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_ESIS p
      SET 
          client_number_bank_encrypted = source.new_client_number_bank_encrypted,
          bank_number_encrypted = source.new_bank_number_encrypted,
          account_number_encrypted = source.new_account_number_encrypted,
          payment_message_encrypted = source.new_payment_message_encrypted,
          client_number_bank = NULL,
          bank_number = NULL,
          account_number = NULL,
          payment_message = NULL,
          source_system_policy_id = source.new_source_system_policy_id,
          aca_claim_id = source.new_aca_claim_id,
          aca_reserve_type_id = source.new_aca_reserve_type_id,
          aca_policy_id = source.new_aca_policy_id,
          aca_payment_attribute_id = source.new_aca_payment_attribute_id,
          aca_payee_id = source.new_aca_payee_id,
          coverage_group_code = source.new_coverage_group_code,
          reserve_type = source.new_reserve_type,
          aca_source_system_id = source.sourceSystemIdEsis,
          aca_date_updated = CURRENT_TIMESTAMP(),
          aca_update_user = 'dbo.spaca_aca_payment_transaction_staging_esis_update'
      FROM (
          WITH temp_esis_missing_claim_policy AS (
              SELECT
                  c.source_system_claim_id,
                  p.source_system_policy_id,
                  p.aca_policy_id,
                  c.claim_coverage_code
              FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS c
              INNER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_TRANSACTION AS ct ON ct.aca_claim_id = c.aca_claim_id
              INNER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY AS p ON p.aca_policy_id = ct.aca_policy_id
              WHERE ct.aca_source_system_id = (SELECT aca_source_system_id FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE source_system = (SELECT MAX(source_system) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_ESIS))
              AND ct.aca_current_flag = 'Y'
              AND ct.aca_policy_id <> -1
              AND c.source_system_claim_id IN (SELECT DISTINCT source_system_claim_id FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_ESIS WHERE source_system_policy_id IS NULL OR claim_coverage_code IS NULL)
          )
          SELECT
              p_inner.source_system_claim_id as join_key_source_system_claim_id,
              IFF(p_inner.client_number_bank_encrypted IS NULL, ENCRYPT(TO_VARIANT(p_inner.client_number_bank), 'dummy_passphrase_placeholder'), p_inner.client_number_bank_encrypted) as new_client_number_bank_encrypted,
              IFF(p_inner.bank_number_encrypted IS NULL, ENCRYPT(TO_VARIANT(p_inner.bank_number), 'dummy_passphrase_placeholder'), p_inner.bank_number_encrypted) as new_bank_number_encrypted,
              IFF(p_inner.account_number_encrypted IS NULL, ENCRYPT(TO_VARIANT(p_inner.account_number), 'dummy_passphrase_placeholder'), p_inner.account_number_encrypted) as new_account_number_encrypted,
              IFF(p_inner.payment_message_encrypted IS NULL, ENCRYPT(TO_VARIANT(p_inner.payment_message), 'dummy_passphrase_placeholder'), p_inner.payment_message_encrypted) as new_payment_message_encrypted,
              COALESCE(p_inner.source_system_policy_id, mc.source_system_policy_id) as new_source_system_policy_id,
              COALESCE(c.aca_claim_id, -1) as new_aca_claim_id,
              COALESCE(rt.aca_reserve_type_id, -1) as new_aca_reserve_type_id,
              COALESCE(p_inner.aca_policy_id, po.aca_policy_id, mc.aca_policy_id, -1) as new_aca_policy_id,
              COALESCE(pa.aca_payment_attribute_id, -1) as new_aca_payment_attribute_id,
              COALESCE(pe.aca_payee_id, -1) as new_aca_payee_id,
              COALESCE(p_inner.coverage_group_code, mc.claim_coverage_code) as new_coverage_group_code,
              rt.transaction_group as new_reserve_type,
              (SELECT aca_source_system_id FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE source_system = (SELECT MAX(source_system) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_ESIS)) as sourceSystemIdEsis
          FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_ESIS AS p_inner
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS c ON c.source_system_claim_id = p_inner.source_system_claim_id
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY AS po ON po.source_system_policy_id = p_inner.source_system_policy_id
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_ATTRIBUTE AS pa ON pa.source_system_payment_attribute_id = p_inner.source_system_payment_attribute_id
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYEE AS pe ON pe.source_system_payee_id = p_inner.source_system_payee_id
          LEFT JOIN temp_esis_missing_claim_policy AS mc ON mc.source_system_claim_id = p_inner.source_system_claim_id
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_RESERVE_TYPE_MAPPING AS rt
              ON rt.payment_type_code = p_inner.payment_type_code
              AND rt.coverage_group_code = COALESCE(p_inner.coverage_group_code, mc.claim_coverage_code)
              AND rt.aca_source_system_id = (SELECT aca_source_system_id FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE source_system = (SELECT MAX(source_system) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_TRANSACTION_STAGING_ESIS))
      ) AS source
      WHERE p.source_system_claim_id = source.join_key_source_system_claim_id;

      END;
    testsEnabled: true
    truncateBefore: false
