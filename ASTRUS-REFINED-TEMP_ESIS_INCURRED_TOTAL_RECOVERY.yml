              FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION') }} AS REC
              INNER JOIN {{ ref('ASTRUS-REFINED', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION') }} AS C ON C.SOURCE_SYSTEM_CLAIM_ID = REC.SOURCE_SYSTEM_CLAIM_ID AND C.ACA_RESERVE_TYPE_ID = REC.ACA_RESERVE_TYPE_ID
