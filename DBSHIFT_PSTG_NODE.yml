operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
        USE ALLIANT_CLAIMS_ASTRUS_STAGE;
        UPDATE DBO.ACA_CLAIM_STAGING_GB target
        SET
            aca_date_id_claim_date = IFNULL(TRY_CAST(TO_VARCHAR(target.claim_date, 'YYYYMMDD') AS INT), -1),
            aca_date_id_original_open_date = IFNULL(TRY_CAST(TO_VARCHAR(target.original_open_date, 'YYYYMMDD') AS INT), -1),
            aca_account_structure_id = source.new_aca_account_structure_id,
            employee_identification_number_encrypted = IFNULL(target.employee_identification_number_encrypted, ENCRYPT(TO_BINARY(target.employee_identification_number), 'your_passphrase_here')),
            employer_federal_tax_identification_number_encrypted = IFNULL(target.employer_federal_tax_identification_number_encrypted, ENCRYPT(TO_BINARY(target.employer_federal_tax_identification_number), 'your_passphrase_here')),
            death_date_encrypted = IFNULL(target.death_date_encrypted, ENCRYPT(TO_BINARY(CAST(target.death_date AS VARCHAR(25))), 'your_passphrase_here')),
            employee_identification_number = NULL,
            employer_federal_tax_identification_number = NULL,
            death_date = NULL,
            aca_date_updated = CURRENT_TIMESTAMP(),
            aca_update_user = 'spaca_aca_claim_staging_gb_update'
        FROM (
            SELECT
                g.ACA_CLAIM_STAGING_GB_ID,
                IFNULL(ac.aca_account_structure_id, -1) AS new_aca_account_structure_id
            FROM DBO.ACA_CLAIM_STAGING_GB g
            LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE ac
                ON g.source_system_account_structure_id = ac.source_system_account_structure_id
                AND g.aca_source_system_id = ac.aca_source_system_id
        ) AS source
        WHERE target.ACA_CLAIM_STAGING_GB_ID = source.ACA_CLAIM_STAGING_GB_ID;
      END;
    testsEnabled: true
    truncateBefore: false
