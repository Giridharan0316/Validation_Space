              INNER JOIN {{ ref('ASTRUS-REFINED', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION') }} AS C ON C.SOURCE_SYSTEM_CLAIM_ID = RES.SOURCE_SYSTEM_CLAIM_ID AND C.ACA_RESERVE_TYPE_ID = RES.ACA_RESERVE_TYPE_ID
